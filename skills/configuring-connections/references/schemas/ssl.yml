SSL:
  type: object
  description: |-
    SSL/TLS certificate configuration for database connections that use client certificate
    (mTLS) authentication or connect to servers with private CA-signed certificates. Provide
    cert and key together for mTLS, ca for a private CA, and passphrase only when the private
    key is encrypted; cert/key and ca can be combined.
  properties:
    ca:
      type: string
      description: |-
        Certificate Authority certificate in PEM format. Set when the database server uses a
        certificate signed by a private CA not in the system's default trust store.
      writeOnly: true
    key:
      type: string
      description: |-
        Client private key in PEM format, paired with cert for mTLS authentication.
        Cannot be provided without cert.
      writeOnly: true
    passphrase:
      type: string
      description: Passphrase that decrypts the private key in the key field, when that key is password-protected.
      writeOnly: true
      examples:
        - "client-key-passphrase-EXAMPLE"
    cert:
      type: string
      description: |-
        Client certificate in PEM format, paired with key for mTLS authentication.
        Cannot be provided without key.
      writeOnly: true