NetSuite:
  type: object
  description: |-
    Configuration for NetSuite ERP connections. Used when the connection type is "netsuite".
    The authType field selects the authentication method; token-based authentication (TBA) is
    recommended for production.
  properties:
    authType:
      type: string
      enum:
        - basic
        - token
        - token-auto
      x-enumDescriptions:
        basic: Legacy email and password authentication (not recommended for new connections).
        token: Token-Based Authentication (TBA) using tokenId and tokenSecret.
        token-auto: Automatic token management via Celigo's iClient with auto-rotation.
      description: |-
        Authentication method for the NetSuite connection. Use token (TBA) for production;
        token-auto delegates token lifecycle to an iClient. Avoid basic for new connections.
      x-lowercase: true
    account:
      type: string
      description: |
        NetSuite account ID. REQUIRED for all auth types.

        This is the account identifier visible in NetSuite under Setup > Company > Company Information.
        The value is automatically uppercased.

        Format varies by environment:
        - Production: "123456" or "TSTDRV123456"
        - Non-production: "123456_SB1" (suffix indicates the environment number)
        - Beta: "123456" (same as production, but with environment set to "beta")
      x-uppercase: true
    environment:
      type: string
      enum:
        - production
        - beta
      x-enumDescriptions:
        production: Connect to the live production NetSuite instance.
        beta: Connect to the NetSuite beta/release-preview environment.
      description: |-
        NetSuite environment to connect to. Defaults to production when not specified.
    tokenId:
      type: string
      description: |
        NetSuite TBA token ID (encrypted at rest). REQUIRED when authType is "token".

        Generated in NetSuite under Setup > Users/Roles > Access Tokens.
        Must be paired with the corresponding tokenSecret.
      writeOnly: true
    tokenSecret:
      type: string
      description: |
        NetSuite TBA token secret (encrypted at rest). REQUIRED when authType is "token".

        Generated alongside the tokenId in NetSuite. Treat as a sensitive credential.
      writeOnly: true
    entityId:
      type: string
      description: NetSuite entity/user ID associated with the token.
    tokenName:
      type: string
      description: Human-readable name of the NetSuite access token for identification purposes.
    roleId:
      type: string
      description: |
        NetSuite role ID that determines the permissions for this connection.

        The role controls which records, fields, and operations are accessible.
        Must match the role associated with the access token in NetSuite.
    email:
      type: string
      description: |
        NetSuite user email address. REQUIRED when authType is "basic".
        Used as the login credential for basic (email/password) authentication.
      format: email
    password:
      type: string
      description: NetSuite user password (encrypted at rest). REQUIRED when authType is "basic".
      writeOnly: true
    requestLevelCredentials:
      type: boolean
      description: |
        When true, authentication credentials are sent with each individual API request
        rather than maintaining a persistent session. Enable this for environments
        where session-based auth is unreliable.
    dataCenterURLs:
      type: object
      description: |
        NetSuite data center URL overrides. Normally auto-discovered from the account ID.
        Only set this to override the default data center routing.
    accountName:
      type: string
      description: Human-readable NetSuite account name (display purposes only).
    roleName:
      type: string
      description: Human-readable name of the NetSuite role (display purposes only).
    wsdlVersion:
      type: string
      description: |
        NetSuite WSDL (Web Services Description Language) version for SuiteTalk Web Services.
        Controls which API version is used for SOAP-based operations. Use latest for the most
        recent stable version, or pin to a specific version for stability.
      enum:
        - latest
        - next
        - '2023.2'
        - '2023.1'
        - '2022.2'
        - '2022.1'
      x-enumDescriptions:
        latest: Use the most recent stable WSDL version.
        next: Use the next pre-release WSDL version.
        '2023.2': Pin to NetSuite WSDL version 2023.2.
        '2023.1': Pin to NetSuite WSDL version 2023.1.
        '2022.2': Pin to NetSuite WSDL version 2022.2.
        '2022.1': Pin to NetSuite WSDL version 2022.1.
      default: latest
    applicationId:
      type: string
      description: |
        NetSuite application ID from the integration record.
        Required for some authentication configurations to identify the calling application.
    concurrencyLevelRESTlet:
      type: number
      description: |
        Maximum concurrent requests to NetSuite RESTlet endpoints.
        NetSuite enforces governance limits on concurrent RESTlet requests per account.
        Keep this low to avoid SuiteScript governance errors.
      minimum: 1
      maximum: 10
      default: 1
    concurrencyLevelWebServices:
      type: number
      description: |
        Maximum concurrent requests to NetSuite SuiteTalk Web Services (SOAP API).
        NetSuite enforces concurrency limits per account — exceeding them causes
        "Only one request may be made against a session at a time" errors.
      minimum: 1
      maximum: 10
      default: 5
    concurrencyLevel:
      type: number
      description: |
        General concurrency level for this connection. Controls the overall
        maximum concurrent requests across all operation types.
      minimum: 1
      maximum: 10
      default: 5
    targetConcurrencyLevel:
      type: number
      description: |
        Target concurrency level for auto-scaling. The system adjusts concurrency
        between 1 and this value based on rate limit and governance feedback.
      minimum: 1
      maximum: 10
    _iClientId:
      type: string
      format: objectId
      description: ID of the iClient used for token-based authentication.
