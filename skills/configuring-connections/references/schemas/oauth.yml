OAuth:
  type: object
  description: |-
    OAuth 2.0 and OAuth 1.0a authentication configuration.
    Used as a sub-object within HTTP and REST connection auth configurations.
    The grantType field selects the OAuth 2.0 flow; for legacy OAuth 1.0a APIs, use the oauth1 sub-object.
  properties:
    type:
      type: string
      enum:
        - custom
        - assistant
      x-enumDescriptions:
        custom: Fully user-configured OAuth settings.
        assistant: Pre-configured OAuth settings via an application assistant connector.
      description: |-
        OAuth configuration mode. Controls whether settings are user-configured or
        pre-populated by an application assistant connector.
    grantType:
      type: string
      enum:
        - authorizationcode
        - clientcredentials
        - password
        - implicit
      x-enumDescriptions:
        authorizationcode: Authorization Code flow requiring user consent via browser redirect.
        clientcredentials: Client Credentials flow for server-to-server authentication without user involvement.
        password: Resource Owner Password Credentials flow exchanging username and password for tokens.
        implicit: Implicit flow (legacy, not recommended for new integrations).
      description: |-
        OAuth 2.0 grant type that determines the authentication flow.
        Use authorizationcode for user-context integrations, clientcredentials for
        server-to-server, and password only when the API does not support other flows.
      default: authorizationcode
      x-lowercase: true
    authURI:
      type: string
      format: uri
      description: |
        OAuth 2.0 authorization endpoint URL.
        REQUIRED for "authorizationcode" grant type. The user is redirected to this URL
        to authorize the application.
    tokenURI:
      type: string
      format: uri
      description: |
        OAuth 2.0 token endpoint URL.
        REQUIRED for "authorizationcode", "clientcredentials", and "password" grant types.
        The system exchanges credentials or authorization codes for access tokens at this URL.
    skipOauthValidations:
      type: boolean
      description: |
        When true, skips Celigo's built-in OAuth configuration validation.
        Use when the API has non-standard OAuth requirements that conflict with validation rules.
      default: false
    scope:
      type: array
      items:
        type: string
      description: |
        OAuth scopes to request during authorization. Controls the level of API access.
        Scope values are API-specific (e.g., "read", "write", "admin").
    scopeDelimiter:
      type: string
      description: |
        Delimiter between multiple scope values. Defaults to a space (" ") per the
        OAuth 2.0 spec. Some APIs use commas or other delimiters.
      default: " "
    clientId:
      type: string
      description: |
        OAuth client ID (application ID) registered with the API provider.
        REQUIRED for all OAuth 2.0 grant types.
    clientSecret:
      type: string
      description: |
        OAuth client secret (encrypted at rest).
        REQUIRED for "authorizationcode" and "clientcredentials" grant types.
      writeOnly: true
    username:
      type: string
      description: |
        Resource owner username. REQUIRED when grantType is "password".
    password:
      type: string
      description: |
        Resource owner password (encrypted at rest). REQUIRED when grantType is "password".
      writeOnly: true
    clientCredentialsLocation:
      type: string
      enum:
        - header
        - body
      x-enumDescriptions:
        header: Send client credentials as an HTTP Basic Auth header (recommended).
        body: Send client credentials as form parameters in the request body.
      description: |-
        Where to send client credentials in token requests. Defaults to header
        (HTTP Basic Auth), which is recommended by the OAuth spec. Use body when
        the API does not support Basic Auth for client credentials.
      default: header
      x-lowercase: true
    accessTokenPath:
      type: string
      description: |
        JSON path to extract the access token from the token endpoint response.
        Defaults to "access_token" per the OAuth 2.0 spec.
        Change only if the API returns the token at a non-standard path.
    accessTokenHeaders:
      type: array
      description: |
        Additional HTTP headers to include in token endpoint requests.
        Use for APIs that require custom headers beyond the standard OAuth parameters.
      items:
        type: object
        properties:
          name:
            type: string
          value:
            type: string
    accessTokenBody:
      type: string
      description: |
        Additional body content to include in token endpoint requests.
        Appended to the standard OAuth parameters.
    oauth2RedirectUrl:
      type: string
      description: |
        OAuth 2.0 redirect URI (callback URL) registered with the API provider.
        Must exactly match the redirect URI configured in the OAuth application registration.
    useIClientFields:
      type: boolean
      description: |
        When true, uses iClient-managed OAuth credentials (clientId/clientSecret)
        instead of the values in this configuration.
    oauth1:
      type: object
      description: |
        OAuth 1.0a configuration for legacy APIs that use the older OAuth protocol.

        **Required fields**
        - consumerKey (always required)
        - accessToken (always required)
        - For HMAC methods: consumerSecret and tokenSecret
        - For RSA methods: consumerPrivateKey
      properties:
        consumerKey:
          type: string
          description: |
            OAuth 1.0a consumer key (API key). REQUIRED.
            Identifies the application making the request.
        consumerSecret:
          type: string
          description: |
            OAuth 1.0a consumer secret (encrypted at rest).
            REQUIRED for HMAC and PLAINTEXT signature methods.
          writeOnly: true
        accessToken:
          type: string
          description: |
            OAuth 1.0a access token (encrypted at rest). REQUIRED.
            Represents the user's authorization for the application to access their data.
          writeOnly: true
        tokenSecret:
          type: string
          description: |
            OAuth 1.0a token secret (encrypted at rest).
            REQUIRED for HMAC and PLAINTEXT signature methods.
          writeOnly: true
        signatureMethod:
          type: string
          enum:
            - HMAC-SHA1
            - HMAC-SHA256
            - HMAC-SHA512
            - RSA-SHA1
            - RSA-SHA256
            - RSA-SHA512
            - PLAINTEXT
          x-enumDescriptions:
            HMAC-SHA1: HMAC signing with SHA-1 (most widely supported, legacy).
            HMAC-SHA256: HMAC signing with SHA-256 for improved security.
            HMAC-SHA512: HMAC signing with SHA-512 (strongest HMAC variant).
            RSA-SHA1: RSA signing with SHA-1 (legacy).
            RSA-SHA256: RSA signing with SHA-256 for improved security.
            RSA-SHA512: RSA signing with SHA-512 (strongest RSA variant).
            PLAINTEXT: No cryptographic signing, only for testing over HTTPS.
          description: |-
            OAuth 1.0a request signing method. HMAC methods require consumerSecret and
            tokenSecret; RSA methods require consumerPrivateKey. PLAINTEXT offers no
            cryptographic signing and should only be used for testing over HTTPS.
        consumerPrivateKey:
          type: string
          description: |
            RSA private key for OAuth 1.0a RSA signature methods (encrypted at rest).
            REQUIRED when signatureMethod is RSA-SHA1, RSA-SHA256, or RSA-SHA512.
          writeOnly: true
        realm:
          type: string
          description: |
            OAuth realm value included in the Authorization header.
            Some APIs require this to identify the authentication domain.
    pkceCodeVerifier:
      type: string
      description: |
        PKCE (Proof Key for Code Exchange) code verifier for enhanced OAuth 2.0 security.
        Managed internally by the system during authorization code flows.
      writeOnly: true
