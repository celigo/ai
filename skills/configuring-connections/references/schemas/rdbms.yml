RDBMS:
  type: object
  description: |-
    Configuration for relational database connections. Used when the connection type is "rdbms".
    The type field selects the database system, which determines the SQL dialect, connection driver,
    default port, and which additional sub-fields are required.
  required:
    - type
  properties:
    type:
      type: string
      enum:
        - mysql
        - postgresql
        - mssql
        - snowflake
        - oracle
        - bigquery
        - redshift
        - mariadb
        - azuresynapse
      x-enumDescriptions:
        mysql: MySQL database (default port 3306).
        postgresql: PostgreSQL database (default port 5432).
        mssql: Microsoft SQL Server (default port 1433).
        snowflake: Snowflake Data Cloud (requires snowflake.warehouse).
        oracle: Oracle Database (default port 1521, uses serviceName instead of database).
        bigquery: Google BigQuery (requires service account credentials).
        redshift: Amazon Redshift (optionally uses AWS IAM credentials).
        mariadb: MariaDB database (default port 3306).
        azuresynapse: Azure Synapse Analytics (default port 1433).
      description: |-
        The specific relational database system to connect to. Determines the SQL dialect,
        connection driver, default port, and which additional sub-fields are required.
    host:
      type: string
      description: |
        Database server hostname or IP address.
        REQUIRED for all types except BigQuery (which uses Google's API endpoints).

        For Snowflake, use the account URL format: "account_identifier.snowflakecomputing.com".
        For Redshift, use the cluster endpoint: "cluster-name.region.redshift.amazonaws.com".
    port:
      type: number
      description: |
        Database server port number. If omitted, uses the default port for the database type:
        - MySQL/MariaDB: 3306
        - PostgreSQL: 5432
        - MS SQL/Azure Synapse: 1433
        - Oracle: 1521
        - Snowflake: 443
        - Redshift: 5439
      minimum: 1
      maximum: 65535
    database:
      type: string
      description: |
        Database name to connect to. REQUIRED for most types.

        For Oracle, use the serviceName field instead of database.
        For BigQuery, use bigquery.dataset to specify the target dataset.
    instanceName:
      type: string
      description: |
        Named instance identifier. Used by MS SQL Server and Oracle when the server
        hosts multiple database instances. Not required for default instances.
    user:
      type: string
      description: |
        Database username for authentication.
        REQUIRED for all types except BigQuery (which uses service account auth).
    password:
      type: string
      description: Database password (encrypted at rest). REQUIRED alongside user for password-based auth.
      writeOnly: true
    version:
      type: string
      description: Database server version string. Used by some drivers for compatibility adjustments.
    serviceName:
      type: string
      description: |
        Oracle service name. Used instead of the database field for Oracle connections.
        This is the TNS service name or pluggable database (PDB) service name.
    serverType:
      type: string
      enum:
        - dedicated
        - shared
        - pooled
      x-enumDescriptions:
        dedicated: Each connection gets its own server process, best for heavy workloads.
        shared: Connections share a pool of server processes for better resource efficiency.
        pooled: Database Resident Connection Pooling (DRCP), best for many short-lived connections.
      description: |-
        Oracle server connection type. Controls the server process model used for connections.
    concurrencyLevel:
      type: number
      description: |
        Maximum number of concurrent database connections.
        Set based on the database server's connection limit and available resources.
      minimum: 1
      maximum: 100
      default: 5
    targetConcurrencyLevel:
      type: number
      description: |
        Target concurrency level for auto-scaling. The system adjusts the number of
        concurrent connections between 1 and this value based on performance feedback.
      minimum: 1
      maximum: 100
    disableStrictSSL:
      type: boolean
      description: |
        When true, disables strict SSL/TLS certificate validation for the database connection.
        Only use for development/testing with self-signed certificates.
      default: false
    snowflake:
      type: object
      description: |
        Snowflake-specific configuration. REQUIRED when type is "snowflake".
      required:
        - warehouse
        - authType
      properties:
        warehouse:
          type: string
          description: |
            Snowflake virtual warehouse name. REQUIRED for Snowflake connections.
            The warehouse provides compute resources for queries. Must be a warehouse
            the user role has access to.
        schema:
          type: string
          description: |
            Default Snowflake schema. If omitted, queries must fully-qualify table names
            (e.g., DATABASE.SCHEMA.TABLE).
        role:
          type: string
          description: |
            Snowflake security role to use for the session. Determines which databases,
            schemas, and warehouses are accessible. Defaults to the user's default role.
        authType:
          type: string
          enum:
            - basic
            - keyPair
          x-enumDescriptions:
            basic: Username and password authentication for Snowflake.
            keyPair: RSA key-pair authentication using a private key.
          description: |-
            Authentication type for Snowflake. Use basic for standard username/password
            connections and keyPair for RSA key-pair auth (requires the connection's key field).
            When creating placeholder connections, use basic.
    mssql:
      type: object
      description: |
        Microsoft SQL Server / Azure Synapse-specific configuration.
      properties:
        authType:
          type: string
          enum:
            - basic
            - azure-service-principal
          x-enumDescriptions:
            basic: Standard SQL Server authentication with username and password.
            azure-service-principal: Azure Active Directory service principal authentication via iClient.
          description: |-
            Authentication type for MS SQL Server. Defaults to basic (username/password).
            Use azure-service-principal for Azure AD service principal auth via an iClient.
          default: basic
    bigquery:
      type: object
      description: |
        Google BigQuery-specific configuration. REQUIRED when type is "bigquery".
        Uses Google Cloud service account credentials for authentication.
      properties:
        projectId:
          type: string
          description: |
            Google Cloud project ID that contains the BigQuery datasets. REQUIRED.
            Found in the Google Cloud Console project settings.
        dataset:
          type: string
          description: |
            Default BigQuery dataset name. REQUIRED.
            Queries will target tables within this dataset unless fully-qualified names are used.
        clientEmail:
          type: string
          description: |
            Google Cloud service account email address. REQUIRED.
            Format: "service-account-name@project-id.iam.gserviceaccount.com".
            The service account must have BigQuery Data Editor and BigQuery Job User roles.
        privateKey:
          type: string
          description: |
            Google Cloud service account private key in PEM format (encrypted at rest). REQUIRED.
            Downloaded as part of the service account JSON key file.
          writeOnly: true
    redshift:
      type: object
      description: |
        Amazon Redshift-specific configuration. AWS credentials are optional —
        only needed for IAM-based authentication instead of standard username/password.
      properties:
        aws:
          type: object
          description: AWS credentials for IAM-based Redshift authentication.
          properties:
            accessKeyId:
              type: string
              description: AWS access key ID for IAM authentication.
            secretAccessKey:
              type: string
              description: AWS secret access key (encrypted at rest).
              writeOnly: true
        clusterIdentifier:
          type: string
          description: Redshift cluster identifier. Required for IAM-based authentication.
        region:
          type: string
          description: |
            AWS region where the Redshift cluster is deployed. Required for IAM-based authentication.
          enum:
            - us-east-1
            - us-east-2
            - us-west-1
            - us-west-2
            - eu-west-1
            - eu-west-2
            - eu-west-3
            - eu-central-1
            - ap-southeast-1
            - ap-southeast-2
            - ap-northeast-1
            - ap-northeast-2
            - ap-south-1
            - sa-east-1
            - ca-central-1
          x-enumDescriptions:
            us-east-1: US East (N. Virginia).
            us-east-2: US East (Ohio).
            us-west-1: US West (N. California).
            us-west-2: US West (Oregon).
            eu-west-1: Europe (Ireland).
            eu-west-2: Europe (London).
            eu-west-3: Europe (Paris).
            eu-central-1: Europe (Frankfurt).
            ap-southeast-1: Asia Pacific (Singapore).
            ap-southeast-2: Asia Pacific (Sydney).
            ap-northeast-1: Asia Pacific (Tokyo).
            ap-northeast-2: Asia Pacific (Seoul).
            ap-south-1: Asia Pacific (Mumbai).
            sa-east-1: South America (Sao Paulo).
            ca-central-1: Canada (Central).
          x-lowercase: true
    ssl:
      $ref: './ssl.yml#/SSL'
    options:
      type: array
      description: |
        Additional database driver connection options as name/value pairs.
        Use for driver-specific settings not covered by the standard fields
        (e.g., connection timeout, charset, application name).
      items:
        type: object
        properties:
          name:
            type: string
            description: Option name (driver-specific).
          value:
            type: string
            description: Option value.
        required:
          - name
          - value
