Response:
  description: Connection object as returned by the API.
  discriminator:
    propertyName: type
    mapping:
      netsuite: '#/Response'
      salesforce: '#/Response'
      ftp: '#/Response'
      s3: '#/Response'
      rest: '#/Response'
      wrapper: '#/Response'
      http: '#/Response'
      rdbms: '#/Response'
      mongodb: '#/Response'
      as2: '#/Response'
      filesystem: '#/Response'
      mcp: '#/Response'
      dynamodb: '#/Response'
      jdbc: '#/Response'
      van: '#/Response'
  oneOf:
    - title: netsuite
      allOf:
        - $ref: './response-base.yml#/ResponseBase'
        - type: object
          properties:
            netsuite:
              allOf:
                - $ref: './netsuite.yml#/NetSuite'
                - type: object
                  properties:
                    suiteAppInstalled:
                      type: boolean
                      description: When true, the Celigo SuiteApp is installed in this NetSuite account.
                      readOnly: true
    - title: salesforce
      allOf:
        - $ref: './response-base.yml#/ResponseBase'
        - type: object
          properties:
            salesforce:
              allOf:
                - $ref: './salesforce.yml#/Salesforce'
                - type: object
                  properties:
                    info:
                      type: object
                      description: Salesforce org metadata populated after a successful ping.
                      readOnly: true
    - title: ftp
      allOf:
        - $ref: './response-base.yml#/ResponseBase'
        - type: object
          properties:
            ftp:
              $ref: './ftp.yml#/FTP'
    - title: s3
      allOf:
        - $ref: './response-base.yml#/ResponseBase'
        - type: object
          properties:
            s3:
              $ref: './s3.yml#/S3'
    - title: rest
      allOf:
        - $ref: './response-base.yml#/ResponseBase'
        - type: object
          properties:
            rest:
              $ref: './rest.yml#/REST'
    - title: wrapper
      allOf:
        - $ref: './response-base.yml#/ResponseBase'
        - type: object
          properties:
            wrapper:
              $ref: './wrapper.yml#/Wrapper'
    - title: http
      allOf:
        - $ref: './response-base.yml#/ResponseBase'
        - type: object
          properties:
            http:
              $ref: './http.yml#/HTTP'
    - title: rdbms
      allOf:
        - $ref: './response-base.yml#/ResponseBase'
        - type: object
          properties:
            rdbms:
              $ref: './rdbms.yml#/RDBMS'
    - title: mongodb
      allOf:
        - $ref: './response-base.yml#/ResponseBase'
        - type: object
          properties:
            mongodb:
              $ref: './mongodb.yml#/MongoDB'
    - title: as2
      allOf:
        - $ref: './response-base.yml#/ResponseBase'
        - type: object
          properties:
            as2:
              $ref: './as2.yml#/AS2'
    - title: filesystem
      allOf:
        - $ref: './response-base.yml#/ResponseBase'
        - type: object
          properties:
            filesystem:
              $ref: './filesystem.yml#/Filesystem'
    - title: mcp
      allOf:
        - $ref: './response-base.yml#/ResponseBase'
        - type: object
          properties:
            mcp:
              $ref: './mcp.yml#/MCP'
    - title: dynamodb
      allOf:
        - $ref: './response-base.yml#/ResponseBase'
        - type: object
          properties:
            dynamodb:
              $ref: './dynamodb.yml#/DynamoDB'
    - title: jdbc
      allOf:
        - $ref: './response-base.yml#/ResponseBase'
        - type: object
          properties:
            jdbc:
              $ref: './jdbc.yml#/JDBC'
    - title: van
      allOf:
        - $ref: './response-base.yml#/ResponseBase'
        - type: object
          properties:
            van:
              $ref: './van.yml#/VAN'
