VAN:
  type: object
  description: |-
    Configuration for VAN (Value-Added Network) connections. Used when the connection type is "van".
    A VAN connection exchanges EDI documents through a managed network mailbox; outbound documents are
    posted to the mailbox and inbound documents are picked up from it, addressed by the connection's AS2 identifier.
  properties:
    as2Id:
      type: string
      description: |-
        AS2 identifier for this VAN station — the "From" identifier on outbound documents and the "To"
        identifier on inbound. Must be unique across all integrator.io VAN connections; a duplicate fails
        the create. Set once when the connection is created and cannot be changed afterward (writes on update
        are ignored). Omit it to have the network assign one automatically.
      examples: ["AcmeFoods_VAN01"]
    mailboxId:
      type: number
      readOnly: true
      description: |-
        Numeric mailbox identifier assigned by the VAN provider when the connection is provisioned.
        Server-assigned and not writable — values sent on create or update are ignored.
      examples: [609973178]
    contentBasedFlowRouter:
      type: object
      description: |-
        Routes inbound documents to different flows based on message content, for a connection shared across
        multiple flows. The named function in the referenced script inspects each incoming document and returns
        the flow to run. Omit to disable content-based routing.
      properties:
        function:
          type: string
          description: Name of the exported function in the referenced script that returns the target flow for each inbound document.
          examples: ["contentBasedFlowRouter"]
        _scriptId:
          type: string
          format: objectId
          x-celigo-refModel: scripts
          description: ID of the script resource that contains the routing function. Must reference an existing script; an unknown ID fails the request with 422 `invalid_ref`.
          examples: ["67642324b29f4856c6865f7c"]
