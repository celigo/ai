Request:
  type: object
  description: Fields that can be sent when creating or updating a connection.
  properties:
    name:
      type: string
      description: Display name for the connection.
      x-celigo-ai-guidance:
        - Use a descriptive, unique name identifying the target system and purpose, especially when managing many connections.
      examples: ["Salesforce Production", "NetSuite Non-Production", "PostgreSQL Orders DB"]
      maxLength: 100
    type:
      type: string
      description: Connection type, which determines the authentication and connectivity options available and which config object must be supplied.
      enum:
        - netsuite
        - salesforce
        - ftp
        - s3
        - wrapper
        - http
        - rdbms
        - mongodb
        - as2
        - filesystem
        - mcp
        - dynamodb
        - jdbc
        - van
        - rest
      x-enumDescriptions:
        netsuite: NetSuite ERP connection using token-based authentication (TBA).
        salesforce: Salesforce CRM connection with OAuth 2.0 authentication.
        ftp: FTP, SFTP, or FTPS file transfer connection.
        s3: Amazon S3 cloud storage connection.
        wrapper: Wrapper connection that delegates to another connection type.
        http: Generic HTTP/REST API connection with full configuration control.
        rdbms: Relational database connection (MySQL, PostgreSQL, Snowflake, etc.).
        mongodb: MongoDB NoSQL database connection.
        as2: AS2 (Applicability Statement 2) EDI connection.
        filesystem: Local or network filesystem connection (requires an Agent).
        mcp: MCP (Model Context Protocol) server connection.
        dynamodb: Amazon DynamoDB NoSQL database connection.
        jdbc: JDBC database connection for systems not covered by RDBMS.
        van: Value-Added Network connection for EDI document exchange.
        rest: REST connection driven by a pre-built HTTP Connector template. Deprecated — use `http` instead.
    externalId:
      type: string
      description: External identifier for the connection, often used to correlate it with a record in a third-party system.
      examples: ["erp-conn-001"]
    assistant:
      type: string
      description: |-
        Lowercase application name for HTTP connections to systems with an integrator.io
        adaptor (e.g. "shopify", "ebay"). Only applies to http connections.
      examples: ["shopify"]
    _agentId:
      type: string
      format: objectId
      x-celigo-refModel: agents
      description: |-
        Reference to a Celigo on-premise Agent. Required for types that need local network or
        filesystem access (filesystem, jdbc agent/activedirectory, Oracle rdbms, and on-premise
        mongodb). The agent establishes a secure tunnel between the on-premise environment and
        integrator.io.
      examples: ["5f8d43a1b9e5a80011a35f2c"]
    _borrowConcurrencyFromConnectionId:
      type: string
      format: objectId
      x-celigo-refModel: connections
      description: |-
        Reference to another connection to share concurrency limits with. When set, this
        connection's traffic counts against the referenced connection's limit instead of its own.
      examples: ["615dfa0742763671275b70ab"]
    debugDate:
      type: string
      format: date-time
      description: Enables debug logging until this timestamp. Set to a future time to capture request/response logs.
      examples: ["2026-01-15T09:30:00.000Z"]
    settingsForm:
      type: object
      description: Dynamic form definition for connection-specific custom settings.
    settings:
      type: object
      description: Connection-specific settings captured by settingsForm.
    pgp:
      description: Present for file-based connections (ftp, s3, filesystem, …) that encrypt or decrypt files with PGP.
      allOf:
        - $ref: './pgp.yml#/PGP'
    ssl:
      $ref: './ssl.yml#/SSL'
    # Connection type-specific config objects — supply the one matching `type`.
    netsuite:
      description: Present when `type` is `netsuite`.
      allOf:
        - $ref: './netsuite.yml#/NetSuite'
    salesforce:
      description: Present when `type` is `salesforce`.
      allOf:
        - $ref: './salesforce.yml#/Salesforce'
    ftp:
      description: Present when `type` is `ftp`.
      allOf:
        - $ref: './ftp.yml#/FTP'
    s3:
      description: Present when `type` is `s3`.
      allOf:
        - $ref: './s3.yml#/S3'
    http:
      description: Present when `type` is `http`.
      allOf:
        - $ref: './http.yml#/HTTP'
    rdbms:
      description: Present when `type` is `rdbms`.
      allOf:
        - $ref: './rdbms.yml#/RDBMS'
    mongodb:
      description: Present when `type` is `mongodb`.
      allOf:
        - $ref: './mongodb.yml#/MongoDB'
    as2:
      description: Present when `type` is `as2`.
      allOf:
        - $ref: './as2.yml#/AS2'
    filesystem:
      description: Present when `type` is `filesystem`.
      allOf:
        - $ref: './filesystem.yml#/Filesystem'
    dynamodb:
      description: Present when `type` is `dynamodb`.
      allOf:
        - $ref: './dynamodb.yml#/DynamoDB'
    jdbc:
      description: Present when `type` is `jdbc`.
      allOf:
        - $ref: './jdbc.yml#/JDBC'
    van:
      description: Present when `type` is `van`.
      allOf:
        - $ref: './van.yml#/VAN'
    mcp:
      description: Present when `type` is `mcp`.
      allOf:
        - $ref: './mcp.yml#/MCP'
    wrapper:
      description: Present when `type` is `wrapper`.
      allOf:
        - $ref: './wrapper.yml#/Wrapper'
    rest:
      deprecated: true
      description: Present when `type` is `rest`. Deprecated — superseded by `http` with a pre-built HTTP Connector template.
      allOf:
        - $ref: './rest.yml#/REST'
  required:
    - name
    - type
  # The config object matching `type` must be supplied. Nested if/else-if (no allOf), stack-style.
  if: { properties: { type: { const: netsuite } }, required: [type] }
  then: { required: [netsuite] }
  else:
    if: { properties: { type: { const: salesforce } }, required: [type] }
    then: { required: [salesforce] }
    else:
      if: { properties: { type: { const: ftp } }, required: [type] }
      then: { required: [ftp] }
      else:
        if: { properties: { type: { const: s3 } }, required: [type] }
        then: { required: [s3] }
        else:
          if: { properties: { type: { const: http } }, required: [type] }
          then: { required: [http] }
          else:
            if: { properties: { type: { const: rdbms } }, required: [type] }
            then: { required: [rdbms] }
            else:
              if: { properties: { type: { const: mongodb } }, required: [type] }
              then: { required: [mongodb] }
              else:
                if: { properties: { type: { const: as2 } }, required: [type] }
                then: { required: [as2] }
                else:
                  # filesystem runs on a Celigo Agent: the connection-level _agentId is API-required
                  # (422 "The file system connection requires Agent") — live-verified celigo-labs-2 2026-06-11.
                  if: { properties: { type: { const: filesystem } }, required: [type] }
                  then: { required: [filesystem, _agentId] }
                  else:
                    if: { properties: { type: { const: mcp } }, required: [type] }
                    then: { required: [mcp] }
                    else:
                      if: { properties: { type: { const: dynamodb } }, required: [type] }
                      then: { required: [dynamodb] }
                      else:
                        if: { properties: { type: { const: jdbc } }, required: [type] }
                        then:
                          required: [jdbc]
                          # _agentId is API-enforced for the agent + activedirectory jdbc types (POST 422
                          # agent_mode_only, live-verified celigo-labs-2). Request-only (cross-level), matching filesystem.
                          if:
                            properties: { jdbc: { properties: { type: { enum: [agent, activedirectory] } }, required: [type] } }
                            required: [jdbc]
                          then: { required: [_agentId] }
                        else:
                          if: { properties: { type: { const: van } }, required: [type] }
                          then: { required: [van] }
                          else:
                            if: { properties: { type: { const: wrapper } }, required: [type] }
                            then:
                              # _stackId required on create only (form-mirror) — the API accepts a
                              # wrapper without it (POST 201, live-verified). Not in the shared/response
                              # schema because connector-managed wrappers (with _connectorId) omit it.
                              required: [wrapper]
                              properties:
                                wrapper:
                                  required: [_stackId]
                            else:
                              if: { properties: { type: { const: rest } }, required: [type] }
                              then: { required: [rest] }
