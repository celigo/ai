Request:
  type: object
  description: Fields that can be sent when creating or updating a connection
  properties:
    name:
      type: string
      description: Display name for the connection.
      examples: ["Salesforce Production", "NetSuite Non-Production", "PostgreSQL Orders DB"]
      maxLength: 200
    type:
      type: string
      description: The type of connection determining which authentication and connectivity options are available
      enum:
        - netsuite
        - salesforce
        - ftp
        - s3
        - rest
        - wrapper
        - http
        - rdbms
        - mongodb
        - as2
        - filesystem
        - mcp
        - dynamodb
        - jdbc
        - van
      x-enumDescriptions:
        netsuite: NetSuite ERP connection with TBA or basic authentication.
        salesforce: Salesforce CRM connection with OAuth 2.0 authentication.
        ftp: FTP, SFTP, or FTPS file transfer connection.
        s3: Amazon S3 cloud storage connection.
        rest: REST connector connection using a pre-built HTTP Connector template.
        wrapper: Wrapper connection that delegates to another connection type.
        http: Generic HTTP/REST API connection with full configuration control.
        rdbms: Relational database connection (MySQL, PostgreSQL, Snowflake, etc.).
        mongodb: MongoDB NoSQL database connection.
        as2: AS2 (Applicability Statement 2) EDI connection.
        filesystem: Local or network filesystem connection (requires an Agent).
        mcp: MCP (Model Context Protocol) server connection.
        dynamodb: Amazon DynamoDB NoSQL database connection.
        jdbc: JDBC database connection for systems not covered by RDBMS.
        van: Value-Added Network connection for EDI document exchange.
    externalId:
      type: string
      description: External identifier for the connection, often used for integration with third-party systems
    assistant:
      type: string
      description: |
        Application name in lowercase for HTTP connections to systems with integrator.io adaptors.
        Used to identify the target application being connected to.
        Examples - Shopify: "shopify", eBay: "ebay".
        Only applicable for HTTP connection types.
    _agentId:
      type: string
      format: objectId
      x-celigo-refModel: agents
      description: |
        Reference to a Celigo on-premise Agent. Required for connection types that need
        local network or filesystem access (JDBC, filesystem, Oracle RDBMS).
        The agent establishes a secure tunnel between the on-premise environment and integrator.io.
    _borrowConcurrencyFromConnectionId:
      type: string
      format: objectId
      x-celigo-refModel: connections
      description: |
        Reference to another connection to share concurrency limits with.
        When set, this connection's concurrency is counted against the referenced
        connection's limit instead of maintaining its own.
    debugDate:
      type: string
      format: date-time
      description: Date until which debug logging is enabled for this connection
    settingsForm:
      type: object
      description: Dynamic form configuration for connection-specific settings
    settings:
      type: object
      description: Connection-specific settings and configurations
    pgp:
      type: object
      description: PGP encryption settings for file-based connections
    ssl:
      $ref: './ssl.yml#/SSL'
    # Connection type-specific schemas
    netsuite:
      $ref: './netsuite.yml#/NetSuite'
    salesforce:
      $ref: './salesforce.yml#/Salesforce'
    ftp:
      $ref: './ftp.yml#/FTP'
    s3:
      $ref: './s3.yml#/S3'
    rest:
      $ref: './rest.yml#/REST'
    http:
      $ref: './http.yml#/HTTP'
    rdbms:
      $ref: './rdbms.yml#/RDBMS'
    mongodb:
      $ref: './mongodb.yml#/MongoDB'
    as2:
      $ref: './as2.yml#/AS2'
    filesystem:
      $ref: './filesystem.yml#/Filesystem'
    dynamodb:
      $ref: './dynamodb.yml#/DynamoDB'
    jdbc:
      $ref: './jdbc.yml#/JDBC'
    van:
      $ref: './van.yml#/VAN'
    mcp:
      $ref: './mcp.yml#/MCP'
    wrapper:
      $ref: './wrapper.yml#/Wrapper'
  required:
    - name
    - type
  discriminator:
    propertyName: type
    mapping:
      netsuite: '#/Request'
      salesforce: '#/Request'
      ftp: '#/Request'
      s3: '#/Request'
      rest: '#/Request'
      http: '#/Request'
      rdbms: '#/Request'
      mongodb: '#/Request'
      as2: '#/Request'
      filesystem: '#/Request'
      mcp: '#/Request'
      dynamodb: '#/Request'
      jdbc: '#/Request'
      van: '#/Request'
      wrapper: '#/Request'
  oneOf:
    - title: netsuite
      required: [netsuite]
      properties:
        netsuite:
          $ref: './netsuite.yml#/NetSuite'
    - title: salesforce
      required: [salesforce]
      properties:
        salesforce:
          $ref: './salesforce.yml#/Salesforce'
    - title: ftp
      required: [ftp]
      properties:
        ftp:
          $ref: './ftp.yml#/FTP'
    - title: s3
      required: [s3]
      properties:
        s3:
          $ref: './s3.yml#/S3'
    - title: rest
      required: [rest]
      properties:
        rest:
          $ref: './rest.yml#/REST'
    - title: http
      required: [http]
      properties:
        http:
          $ref: './http.yml#/HTTP'
    - title: rdbms
      required: [rdbms]
      properties:
        rdbms:
          $ref: './rdbms.yml#/RDBMS'
    - title: mongodb
      required: [mongodb]
      properties:
        mongodb:
          $ref: './mongodb.yml#/MongoDB'
    - title: as2
      required: [as2]
      properties:
        as2:
          $ref: './as2.yml#/AS2'
    - title: filesystem
      required: [filesystem]
      properties:
        filesystem:
          $ref: './filesystem.yml#/Filesystem'
    - title: mcp
      required: [mcp]
      properties:
        mcp:
          $ref: './mcp.yml#/MCP'
    - title: dynamodb
      required: [dynamodb]
      properties:
        dynamodb:
          $ref: './dynamodb.yml#/DynamoDB'
    - title: jdbc
      required: [jdbc]
      properties:
        jdbc:
          $ref: './jdbc.yml#/JDBC'
    - title: van
      required: [van]
      properties:
        van:
          $ref: './van.yml#/VAN'
    - title: wrapper
      required: [wrapper]
      properties:
        wrapper:
          $ref: './wrapper.yml#/Wrapper'