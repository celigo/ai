FTP:
  type: object
  description: |-
    Configuration for FTP/SFTP/FTPS file transfer connections. Used when the connection type is "ftp".
    The type field selects the transfer protocol, which determines port defaults and available auth methods.
  required:
    - type
    - hostURI
    - username
  properties:
    type:
      type: string
      enum:
        - ftp
        - sftp
        - ftps
      x-enumDescriptions:
        ftp: Standard FTP with no transport encryption (default port 21).
        sftp: SSH-based file transfer with encrypted transport (default port 22); supports SSH key auth via authKey.
        ftps: FTP over TLS/SSL with encrypted transport; port 21 for explicit TLS or 990 for implicit (useImplicitFtps).
      description: |-
        File transfer protocol type. Prefer sftp for security. Use ftps when the
        server requires TLS. Only use ftp for legacy systems without encryption support.
      examples: ["sftp"]
    hostURI:
      type: string
      description: |
        FTP server hostname or IP address.
        Do NOT include the protocol prefix (e.g., use "ftp.example.com", not "sftp://ftp.example.com").
      examples: ["sftp.example.com"]
    port:
      type: number
      description: |
        Server port number. When omitted, defaults to the standard port for the
        protocol: 21 for ftp, 22 for sftp, 21 for explicit ftps, and 990 for implicit ftps.
      minimum: 0
      maximum: 65535
      examples: [22]
    username:
      type: string
      description: Username for server authentication.
      examples: ["ftpuser"]
    password:
      type: string
      writeOnly: true
      description: |-
        Password for server authentication (encrypted at rest; returned masked as `"******"`).
        For sftp, supply either password or authKey (SSH key).
      x-celigo-ui-override: >-
        Required by the connection form: a password for ftp/ftps, or a password or SSH key
        (authKey) for sftp (see the if/then/else rule below). Encoded here to mirror the form
        so builders produce complete, connectable configurations.
      x-celigo-ai-guidance:
        - For ftp/ftps set password; for sftp set password or authKey. The connection cannot authenticate without credentials.
      examples: ["s3cr3t-ftp-passw0rd"]
    authKey:
      type: string
      description: |
        SSH private key for SFTP key-based authentication (encrypted at rest; returned masked as `"******"`).
        Only used when type is "sftp". Provide the full PEM-encoded private key.
        Can be used alone or alongside a password for two-factor auth.
      writeOnly: true
    usePassiveMode:
      type: boolean
      description: |
        When true, uses passive mode for FTP/FTPS data connections.
        In passive mode, the client initiates both control and data connections,
        which works better through firewalls and NAT. Enable for most scenarios.
      default: true
    enableHostVerification:
      type: boolean
      description: |
        When true, verifies the server's SSH host key (sftp) or TLS certificate (ftps).
        Disable only for development/testing with self-signed certificates.
    userDirectoryIsRoot:
      type: boolean
      description: |
        When true, treats the user's home directory as the root directory.
        All paths are relative to the user's home directory rather than the server root.
      default: false
    useImplicitFtps:
      type: boolean
      description: |
        When true, uses implicit FTPS (TLS connection established immediately on port 990).
        When false, uses explicit FTPS (starts as FTP on port 21, upgrades to TLS via STARTTLS).
        Only applies when type is "ftps".
      default: false
    requireSocketReUse:
      type: boolean
      description: |
        When true, requires the data connection to reuse the same TLS session as the control connection.
        Some FTPS servers require this for security. Only applies to FTPS connections.
      default: false
    entryParser:
      type: string
      enum:
        - UNIX
        - UNIX-TRIM
        - VMS
        - WINDOWS
        - OS/2
        - OS/400
        - AS/400
        - MVS
        - UNKNOWN-TYPE
        - NETWARE
        - MACOS-PETER
      x-enumDescriptions:
        UNIX: Standard Unix/Linux directory listing format (most common).
        UNIX-TRIM: Unix format with trimmed whitespace for non-standard servers.
        VMS: OpenVMS directory listing format.
        WINDOWS: Windows FTP server DOS-style directory listing format.
        OS/2: IBM OS/2 directory listing format.
        OS/400: IBM OS/400 directory listing format.
        AS/400: IBM AS/400 (iSeries) directory listing format.
        MVS: IBM mainframe MVS directory listing format.
        UNKNOWN-TYPE: Attempt automatic detection of the listing format.
        NETWARE: Novell NetWare directory listing format.
        MACOS-PETER: macOS Peter's FTP server directory listing format.
      description: |-
        File listing format parser. Controls how directory listings from the server are interpreted.
        Most servers use UNIX format. Only change this if directory listings appear garbled.
      examples: ["UNIX"]
      x-uppercase: true
    pgpEncryptKey:
      type: string
      deprecated: true
      description: |
        Deprecated: legacy FTP-scoped PGP public key. Superseded by the connection-level `pgp.publicKey`,
        which the current form writes; retained for the few existing connections still on this path
        (encrypted at rest).
      writeOnly: true
    pgpDecryptKey:
      type: string
      deprecated: true
      description: |
        Deprecated: legacy FTP-scoped PGP private key. Superseded by the connection-level `pgp.privateKey`;
        retained for the few existing connections still on this path (encrypted at rest).
      writeOnly: true
    pgpPassphrase:
      type: string
      deprecated: true
      description: 'Deprecated: legacy FTP-scoped PGP passphrase. Superseded by the connection-level `pgp.passphrase` (encrypted at rest; returned masked as `"******"`).'
    pgpKeyAlgorithm:
      type: string
      deprecated: true
      enum:
        - CAST5
        - 3DES
        - AES-128
        - AES-192
        - AES-256
      x-enumDescriptions:
        CAST5: CAST5 symmetric cipher (PGP default, 128-bit key).
        3DES: Triple DES symmetric cipher (168-bit effective key strength).
        AES-128: AES symmetric cipher with a 128-bit key.
        AES-192: AES symmetric cipher with a 192-bit key.
        AES-256: AES symmetric cipher with a 256-bit key (strongest option).
      description: |
        Deprecated: legacy FTP-scoped PGP encryption-algorithm selector, no longer exposed by the
        connection form (the current `pgp` object has no algorithm field). Retained for existing
        connections. AES-256 is the strongest option; CAST5 is the PGP default.
    pgpSignAndVerify:
      type: boolean
      deprecated: true
      description: |
        Deprecated: legacy FTP-scoped PGP sign/verify toggle, no longer exposed by the connection form.
        When true, PGP-signs outbound files and verifies signatures on inbound files. Retained for
        existing connections.
      default: false
    tradingPartner:
      type: boolean
      readOnly: true
      description: |
        When true, this connection is designated a B2B/EDI trading partner. Read-only on the connection
        body — POST/PUT of this field are silently ignored; it is toggled via
        `PUT /connections/{_id}/tradingPartner` (used by the EDI B2B Manager).
    _tpConnectorId:
      type: string
      format: objectId
      x-celigo-refModel: tradingpartnerconnectors
      description: |
        Reference to the trading partner connector this connection belongs to. Must reference an
        existing, published trading partner connector; the API rejects an unknown or unpublished ID
        with 422 `tpconnector_not_found`.
      examples: ["66a1b2c3d4e5f60718293a4b"]
    concurrencyLevel:
      type: number
      description: |
        Maximum number of concurrent file transfer operations.
        FTP servers often have low connection limits — keep this value conservative.
        Values above the account's licensed maximum (25 standard, 50 with an Environments license) are silently clamped down.
      minimum: 1
      maximum: 50
      default: 1
    targetConcurrencyLevel:
      type: number
      description: |
        Target concurrency level for auto-scaling. The system adjusts concurrency
        between 1 and this value based on server response feedback.
      minimum: 1
      maximum: 50
      examples: [5]
  # Conditional requireds mirror the connection form (see x-celigo-ui-override). Stack-style
  # top-level if/then/else; GitBook ignores it, downstream consumers get form-accurate validation.
  # Form rule: sftp needs password or authKey; ftp/ftps need password.
  if:
    properties:
      type:
        const: sftp
    required: [type]
  then:
    anyOf:
      - required: [password]
      - required: [authKey]
  else:
    required: [password]
