Request:
  type: object
  description: |-
    Request schema for creating or updating a trading partner connector.
    Only `name` is required for creation. Connection
    `preConfiguredFields` must include a `type` path (e.g. `ftp` or
    `as2`) and export/import must include `file.type` set to
    `filedefinition` -- these are validated when `published` is `true`.
  properties:
    name:
      type: string
      description: |-
        Connector name. Must be unique across all published connectors.
      examples: ["AS2 EDI X12 Connector", "SFTP EDIFACT Connector"]
    published:
      type: boolean
      default: false
      description: |-
        Whether this connector is published and available platform-wide.
        Requires the `allowedToPublishTPConnectors` permission — without
        it, this field is silently ignored.
    helpURL:
      type: string
      format: uri
      description: URL to documentation for this trading partner connector.
      examples: ["https://docs.celigo.com/hc/en-us/articles/trading-partners"]
    supportedBy:
      type: object
      description: |-
        Field configurations for each resource type involved in trading
        partner onboarding.
      properties:
        ediProfile:
          $ref: "./supported-by-section.yml#/SupportedBySection"
        export:
          $ref: "./supported-by-section.yml#/SupportedBySection"
        import:
          $ref: "./supported-by-section.yml#/SupportedBySection"
        connection:
          $ref: "./supported-by-section.yml#/ConnectionSupportedBySection"
  required:
    - name
