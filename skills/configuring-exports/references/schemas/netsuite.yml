        - Confirm that the specific NetSuite record type supports distribution before setting this field to `true`.
        - Handle this field carefully in integrations to avoid discrepancies in accounting or reporting.

        **Examples**
        - `distributed: true` — The transaction amounts are allocated across multiple departments and locations.
        - `distributed: false` — The transaction is assigned to a single department without any distribution.
        - Omitted `distributed` field — Defaults to non-distributed transaction behavior.

        **Important notes**
