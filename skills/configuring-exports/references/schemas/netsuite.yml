                  - Supports NetSuite formula syntax including SQL-like expressions and functions.
                  - Evaluated server-side during the processing of the RESTlet request.
                  - Must be URL-encoded if included in query parameters of HTTP requests.
            _id:
              type: object
              description: |-
                Unique identifier for the record within the NetSuite system.
                **Field behavior**
                - Serves as the primary key to uniquely identify a specific record.
                - Immutable once the record is created.
                - Used to retrieve, update, or delete the corresponding record.
                **Implementation guidance**
                - Must be a valid NetSuite internal ID format, typically a string or numeric value.
                - Should be provided when querying or manipulating a specific record.
                - Avoid altering this value to maintain data integrity.
                **Examples**
                - "12345"
                - "67890"
                - "abcde12345"
                **Important notes**
                - This ID is assigned by NetSuite and should not be generated manually.
                - Ensure the ID corresponds to an existing record to avoid errors.
                - When used in criteria, it filters the dataset to the exact record matching this ID.
                **Dependency chain**
                - Dependent on the existence of the record in NetSuite.
                - Often used in conjunction with other criteria fields for precise querying.
                **Technical details**
                - Typically represented as a string or integer data type.
                - Used in RESTlet scripts as part of the criteria object to specify the target record.
                - May be included in URL parameters or request bodies depending on the API design.
