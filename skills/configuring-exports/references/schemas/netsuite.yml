        Indicates whether the transaction or record is distributed across multiple departments, locations, classes, or subsidiaries within the NetSuite system, allowing for detailed allocation of amounts or quantities for financial tracking and reporting purposes.

        **Field behavior**
        - Specifies if the transaction’s amounts or quantities are allocated across multiple organizational segments such as departments, locations, classes, or subsidiaries.
        - When set to `true`, the transaction supports detailed distribution, enabling granular financial analysis and reporting.
        - When set to `false` or omitted, the transaction is treated as assigned to a single segment without any distribution.
        - Influences how the transaction data is processed, posted, and reported within NetSuite’s financial modules.

