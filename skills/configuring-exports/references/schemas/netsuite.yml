              description: |-
                Maximum number of records to process in a single batch during the markExported operation, defining the upper limit for batch size to balance performance and resource utilization effectively.

                **Field behavior**
                - Specifies the maximum count of records processed in one batch during the markExported operation.
                - Controls the batch size to optimize throughput while preventing system overload.
                - Helps manage memory usage and processing time by limiting batch volume.
                - Directly affects the frequency and size of API calls or processing cycles.

                **Implementation guidance**
                - Determine an optimal value based on system capacity, performance benchmarks, and typical workload.
                - Ensure the value complies with any API or platform-imposed batch size limits.
                - Consider network conditions, processing latency, and error handling when setting the batch size.
                - Validate that the input is a positive integer and handle invalid values gracefully.
                - Adjust dynamically if possible, based on runtime metrics or error feedback.

                **Examples**
                - 1000: Processes up to 1000 records per batch, suitable for balanced performance.
                - 500: Smaller batch size for environments with limited resources or higher reliability needs.
                - 2000: Larger batch size for high-throughput scenarios where system resources allow.
                - 50: Very small batch size for testing or debugging purposes.

                **Important notes**
                - Excessively high values may lead to timeouts, memory exhaustion, or degraded system responsiveness.
                - Very low values can increase overhead due to more frequent batch processing cycles.
                - This parameter is critical for tuning the performance and stability of the markExported operation.
                - Changes to this value should be tested in a controlled environment before production deployment.

                **Dependency chain**
                - Integral to the batch processing logic within the markExported operation.
                - Interacts with system-level batch size constraints and API rate limits.
                - Influences how records are chunked and iterated during export marking.
                - May affect downstream processing components that consume batch outputs.

                **Technical details**
                - Must be an integer value greater than zero.
                - Typically configured via API request parameters or system configuration files.
                - Should be compatible with the data processing framework and any middleware handling batch operations.
                - May require synchronization with other batch-related settings to ensure consistency.
