            cLocked:
              type: object
              description: |-
                cLocked indicates whether the batch size setting for marking exports is locked, preventing any modifications by users or automated processes. This property serves as a control mechanism to safeguard critical configuration parameters related to export batch processing.

                **Field behavior**
                - Represents a boolean flag that determines if the batch size configuration is immutable.
                - When set to true, the batch size cannot be altered via the user interface, API calls, or automated scripts.
                - When set to false, the batch size remains configurable and can be adjusted as operational needs evolve.
                - Changes to this flag directly affect the ability to update the batch size setting.

                **Implementation guidance**
                - Utilize this flag to enforce configuration stability and prevent accidental or unauthorized changes to batch size settings.
                - Validate this flag before processing any update requests to the batch size to ensure compliance.
                - Typically managed by system administrators or during initial system setup to lock down critical parameters.
                - Incorporate audit logging when this flag is changed to maintain traceability.
                - Consider integrating with role-based access controls to restrict who can toggle this flag.

                **Examples**
                - cLocked: true — The batch size setting is locked, disallowing any modifications.
                - cLocked: false — The batch size setting is unlocked and can be updated as needed.

                **Important notes**
                - Locking the batch size helps maintain consistent export throughput and prevents performance degradation caused by unintended configuration changes.
                - Modifications to this flag should be performed cautiously and ideally under change management procedures.
                - This property is only applicable in environments where batch size configuration for marking exports is relevant.
                - Ensure that dependent systems or processes respect this lock to avoid configuration conflicts.

                **Dependency chain**
                - Dependent on the presence of the markExportedBatchSize configuration object within the system.
                - Interacts with user permission settings and roles that govern configuration management capabilities.
                - May affect downstream export processing workflows that rely on batch size parameters.

                **Technical details**
                - Data type: Boolean.
                - Default value is false, indicating the batch size is unlocked unless explicitly locked.
                - Persisted as part of the NetSuite.restlet.markExportedBatchSize configuration object.
                - Changes to this property should trigger validation and possibly system notifications to administrators.
            min:
              type: object
              description: |-
                Minimum number of records to process in a single batch during the markExported operation in the NetSuite RESTlet integration. This property sets the lower boundary for batch sizes, ensuring that each batch contains at least this number of records before processing begins. It plays a crucial role in balancing processing efficiency and system resource utilization by controlling the granularity of batch operations.

                **Field behavior**
                - Defines the lower limit for the batch size when processing records in the markExported operation.
                - Ensures that each batch contains at least this minimum number of records before processing.
                - Helps optimize performance by preventing excessively small batches that could increase overhead.
                - Works in conjunction with the 'max' batch size to establish a valid range for batch processing.
                - Influences how the system partitions large datasets into manageable chunks for processing.

                **Implementation guidance**
                - Choose a value based on system capabilities, expected record complexity, and API rate limits to avoid timeouts or throttling.
                - Ensure this value is a positive integer greater than zero.
                - Must be less than or equal to the corresponding 'max' batch size to maintain logical consistency.
                - Test different values to find an optimal balance between processing speed and resource consumption.
                - Consider the impact on downstream systems and network latency when setting this value.

                **Examples**
                - 10 (process at least 10 records per batch)
                - 50 (process at least 50 records per batch)
                - 100 (process at least 100 records per batch for high-throughput scenarios)

                **Important notes**
                - Setting this value too low may lead to inefficient processing due to increased overhead from handling many small batches.
                - Setting this value too high may cause processing delays, timeouts, or exceed API rate limits.
                - Always use in conjunction with the 'max' batch size to define a valid and effective batch size range.
                - Changes to this value should be tested in a staging environment before production deployment to assess impact.

                **Dependency chain**
                - Directly related to 'netsuite.restlet.markExportedBatchSize.max', which defines the upper limit of batch size.
                - Utilized within the batch processing logic of the markExported operation in the NetSuite RESTlet integration.
                - Influences and is influenced by system performance parameters and API constraints.

                **Technical details**
                - Data type: Integer
                - Must be a positive integer greater than zero
                - Should be validated at configuration time to ensure it does not exceed the 'max' batch size
            max:
