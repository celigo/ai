Request:
  type: object
  description: Fields for creating or updating a script.
  required:
    - name
    - content
  properties:
    name:
      type: string
      maxLength: 100
      description: Display name for the script.
      examples: ["Order Transform Hook"]
    description:
      type: string
      maxLength: 1024
      description: Free-text explanation of what the script does.
      examples: ["Adds discount line items to each order before import"]
    content:
      type: string
      description: JavaScript source code.
      examples: ["function preSavePage(options) {\n  return { data: options.data, errors: options.errors };\n}"]
    sandbox:
      type: boolean
      deprecated: true
      description: When true, the script runs in an isolated sandbox environment. Deprecated — all scripts now run in sandboxed mode by default.
    postResponseHookToProcessOnChildRecord:
      type: boolean
      default: false
      description: When true, postResponseMap hooks run once per child record in a one-to-many mapping instead of once per parent.
