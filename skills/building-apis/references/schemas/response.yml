API:
  required:
    - _id
    - name
    - createdAt
    - lastModified
  description: |-
    API resource. Shape varies by mode: builder-mode APIs carry `type`, `version`,
    `disabled`, and `builder`; script-mode APIs additionally carry `script` plus
    top-level `_scriptId` / `function` copies. Legacy script APIs (pre-builder era)
    omit `type`, `version`, `disabled`, and `builder` entirely.
  allOf:
    - $ref: './base.yml#/APIBase'
    - type: object
      properties:
        _id:
          type: string
          format: objectId
          readOnly: true
          x-celigo-refModel: apis
          description: Unique identifier for the API.
          examples: ["68ae4264b5f755d2dd3796b4"]
        _integrationId:
          type: string
          format: objectId
          readOnly: true
          x-celigo-refModel: integrations
          description: Integration this API belongs to, when scoped to an integration app.
          examples: ["5e9a8f7c6b3d2a0011c4e5f6"]
        _scriptId:
          type: string
          format: objectId
          readOnly: true
          x-celigo-refModel: scripts
          description: |-
            Top-level copy of `script._scriptId`. Present on script-mode and legacy
            script APIs for backward compatibility.
          examples: ["689212a2c42d988978e27a11"]
        function:
          type: string
          readOnly: true
          description: |-
            Top-level copy of `script.function`. Present on script-mode and legacy
            script APIs for backward compatibility.
          examples: ["handleRequest"]
        createdAt:
          type: string
          format: date-time
          readOnly: true
          description: Timestamp when the API was created.
          examples: ["2025-08-26T23:25:24.107Z"]
        lastModified:
          type: string
          format: date-time
          readOnly: true
          description: Timestamp when the API was last modified.
          examples: ["2026-04-07T03:48:20.795Z"]
        sandbox:
          type: boolean
          deprecated: true
          readOnly: true
          description: Environment flag. Present on older accounts.
        apim:
          $ref: "./apim.yml#/Apim"
