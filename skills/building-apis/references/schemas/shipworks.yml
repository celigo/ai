Shipworks:
  type: object
  description: ShipWorks shipping-management credentials. Legacy feature.
  properties:
    username:
      type: string
      description: ShipWorks username.
      examples: ["shipworks_user"]
    password:
      type: string
      description: ShipWorks password. Masked as `"******"` in GET responses.
      examples: ["******"]
  required:
    - username
    - password

