Flow:
  type: object
  required:
    - _id
    - name
    - disabled
    - logging
    - createdAt
    - lastModified
  description: Flow object as returned by the API.
  allOf:
    - $ref: "./base.yml#/FlowBase"
    - $ref: "../../../common/schemas/resource-response.yml#/ResourceResponse"
    - type: object
      properties:
        lastExecutedAt:
          type: string
          format: date-time
          readOnly: true
          description: Timestamp of the flow's most recent execution. Absent until the flow has run at least once.
          examples: ["2023-04-15T09:15:00Z"]
        resolvedAt:
          type: string
          format: date-time
          readOnly: true
          description: Timestamp when the flow's open errors were last resolved.
          examples: ["2023-04-14T16:45:00Z"]
        free:
          type: boolean
          readOnly: true
          description: When true, the flow is free to run and does not require a paid subscription.
          examples: [false]
        _templateId:
          type: string
          format: objectId
          readOnly: true
          x-celigo-refModel: templates
          description: Template this flow was created from.
          examples: ["60a2c4e6f321d800129a1a3c"]
        _sourceId:
          type: string
          format: objectId
          readOnly: true
          description: Source resource this flow was cloned or installed from.
          examples: ["60a2c4e6f321d800129a1a3c"]
        _exportId:
          type: string
          format: objectId
          readOnly: true
          deprecated: true
          x-celigo-refModel: exports
          description: Legacy single-export reference. Use `pageGenerators` instead.
          examples: ["60a2c4e6f321d800129a1a3c"]
        _importId:
          type: string
          format: objectId
          readOnly: true
          deprecated: true
          x-celigo-refModel: imports
          description: Legacy single-import reference. Use `pageProcessors` instead.
          examples: ["60a2c4e6f321d800129a1a3c"]
