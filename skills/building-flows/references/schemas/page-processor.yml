PageProcessor:
  type: object
  description: |-
    A processing step that operates on pages of records within a flow. Processors are
    either lookups (`type: export`) that enrich records or imports (`type: import`) that
    write records to a destination, and execute sequentially unless routed into branches.
  required:
    - type
  properties:
    type:
      type: string
      description: Selects whether this step runs a lookup export or an import, and which reference field applies.
      enum: ["export", "import"]
      x-enumDescriptions:
        export: Uses an export resource (configured as a lookup) for data lookup or enrichment.
        import: Uses an import resource to send data to a destination system.
      examples: ["export", "import"]
    _exportId:
      type: string
      format: objectId
      x-celigo-refModel: exports
      description: |-
        Lookup export that enriches incoming records. Required when `type` is `export`;
        the referenced export must be configured as a lookup (`isLookup: true`).
      examples: ["60a2c4e6f321d800129a1a3c"]
    _importId:
      type: string
      format: objectId
      x-celigo-refModel: imports
      description: |-
        Import that writes records to the destination system. Required when `type` is `import`.
      examples: ["60a2c4e6f321d800129a1a3c"]
    proceedOnFailure:
      type: boolean
      description: |-
        When true, records that fail in this processor continue to subsequent steps and the
        error is logged. When false, failed records stop at this step.
      examples: [true, false]
    responseMapping:
      $ref: "./response-mapping.yml#/ResponseMapping"
    hooks:
      type: object
      description: Custom code hooks extending this processor's behavior.
      properties:
        postResponseMap:
          type: object
          description: Hook that runs after the step's response mapping completes.
          properties:
            function:
              type: string
              description: Function to invoke within the referenced script.
              examples: ["enrichResponseData"]
            _scriptId:
              type: string
              format: objectId
              x-celigo-refModel: scripts
              description: Script containing the hook function named in `function`.
              examples: ["60a2c4e6f321d800129a1a3c"]
    setupInProgress:
      type: boolean
      description: When true, the processor's configuration is still being set up in the UI and the step is not yet runnable.
  # Conditional requireds by type — nested if/else-if (no allOf), stack-style.
  if:
    properties:
      type:
        const: export
    required: [type]
  then:
    required: [_exportId]
  else:
    if:
      properties:
        type:
          const: import
      required: [type]
    then:
      required: [_importId]
