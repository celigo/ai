PageGenerator:
  type: object
  description: |-
    A data source that produces pages of records for the flow. Page generators are the
    entry points of a flow; each references an export, can carry its own schedule, and
    multiple generators can run in parallel when the flow enables it.
  required:
    - _exportId
  properties:
    _exportId:
      type: string
      format: objectId
      x-celigo-refModel: exports
      description: |-
        Export that retrieves data from the source system. The server rejects page
        generator entries without a valid export reference.
      examples: ["60a2c4e6f321d800129a1a3c"]
    schedule:
      type: string
      description: |-
        Cron expression for this specific generator, overriding the flow's main schedule.
        When omitted, the generator inherits the flow's schedule.
      examples: ["? 5 0,6,12,18 ? * *", "? 30 2 ? * *"]
    skipRetries:
      type: boolean
      description: |-
        When true, failed records from this generator are not retried — errors are logged
        and the flow continues. When false, failed records are retried per platform policy.
      examples: [true, false]
    setupInProgress:
      type: boolean
      description: When true, the generator's configuration is still being set up in the UI and the step is not yet runnable.
      examples: [false]
    _keepDeltaBehindFlowId:
      type: string
      format: objectId
      x-celigo-refModel: flows
      description: |-
        Coordinates delta timing so this generator's checkpoint stays behind the referenced
        flow, preventing child records from being processed before their parents.
      examples: ["60a2c4e6f321d800129a1a3c"]
    _keepDeltaBehindExportId:
      type: string
      format: objectId
      x-celigo-refModel: exports
      description: Like `_keepDeltaBehindFlowId` but targets a specific export's delta timestamp.
      examples: ["60a2c4e6f321d800129a1a3c"]
    __startDateHelper:
      type: string
      description: Internal helper field for managing scheduled start dates.
