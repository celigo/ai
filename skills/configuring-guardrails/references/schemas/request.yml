Request:
  type: object
  description: |-
    Fields that can be sent when creating or updating an import. Set the adaptor-specific
    configuration object matching `adaptorType` (e.g. `netsuite_da` for `NetSuiteDistributedImport`).
  required:
    - name
    - _connectionId
  allOf:
    - $ref: './base.yml#/ImportBase'
