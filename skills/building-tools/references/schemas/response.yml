Tool:
  type: object
  required:
    - _id
    - name
    - _integrationId
    - createdAt
    - lastModified
  description: Tool object as returned by the API.
  allOf:
    - $ref: './base.yml#/ToolBase'
    - $ref: '../../../common/schemas/resource-response.yml#/ResourceResponse'
    - type: object
      properties:
        sandbox:
          type: boolean
          deprecated: true
          readOnly: true
          description: Whether this is a sandbox tool for testing.
          examples: [false]
