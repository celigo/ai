NetsuiteDistributed:
  type: object
  description: |-
    Configuration for NetSuite Distributed (SuiteApp 2.0) import operations — the primary sub-schema for the NetSuiteDistributedImport adaptorType. The API field name is "netsuite_da".
    operation and recordType are required; set internalIdLookup so existing records can be found when operation is update, addupdate, or delete.
  required:
    - operation
    - recordType
  properties:
    operation:
      type: string
      enum:
        - add
        - update
        - addupdate
        - attach
        - detach
        - delete
      x-lowercase: true
      x-enumDescriptions:
        add: Create a new record in NetSuite.
        update: Update an existing record in NetSuite, requires internalIdLookup.
        addupdate: Upsert — update the record if found, otherwise create a new one.
        attach: Attach one NetSuite record to another record.
        detach: Detach a previously attached NetSuite record from another record.
        delete: Delete an existing record from NetSuite, requires internalIdLookup.
      x-celigo-ui-override: >-
        Required by the NetSuite import form (operation is required:true). Encoded to mirror the
        form so builders produce connectable configurations.
      description: |-
        Operation to perform on the target NetSuite record, as a plain string. Required.
        For `update`, `addupdate`, and `delete`, also set internalIdLookup so existing records can be found.
        Default to `addupdate` when the intent is "sync", "upsert", or "create or update"; use `add` for plain "create" or "insert".
        Do not wrap the value in an object like `{"type": "addupdate"}` — that causes a Cast error.
    recordType:
      type: string
      x-celigo-ui-override: >-
        Required by the NetSuite import form (recordType is required:true). Encoded to mirror the
        form so builders produce connectable configurations.
      description: |-
        NetSuite record type to import into (e.g. "customer", "salesOrder", "customrecord_myrecord" for custom record types). Required.
        Must match a valid NetSuite record type identifier.
      examples: ["customer", "salesOrder", "customrecord_user"]
    recordIdentifier:
      type: string
      description: |
        Custom record identifier, used to identify the specific record type when
        importing into custom record types.
    restletVersion:
      type: string
      enum:
        - suitebundle
        - suiteapp1.0
        - suiteapp2.0
      x-lowercase: true
      x-enumDescriptions:
        suitebundle: Legacy SuiteBundle RESTlet version for older NetSuite integrations.
        suiteapp1.0: SuiteApp 1.0 RESTlet version using SuiteScript 1.0.
        suiteapp2.0: SuiteApp 2.0 RESTlet version using SuiteScript 2.0, the modern default.
      description: |-
        Version of the NetSuite RESTlet to use, as a plain string.
        Defaults to "suiteapp2.0" when useSS2Restlets is true, "suitebundle" otherwise; rarely needs to be set explicitly for modern integrations.
        Do not wrap the value in an object like `{"type": "suiteapp2.0"}` — that causes a Cast error.
    useSS2Restlets:
      type: boolean
      description: |-
        When true, uses SuiteScript 2.0 RESTlets and restletVersion defaults to "suiteapp2.0".
        Defaults to true for modern integrations.
    missingOrCorruptedDAConfig:
      type: boolean
      description: |-
        When true, the Distributed Adaptor configuration is missing or corrupted.
        Set by the system — do not set manually.
    batchSize:
      type: number
      description: |
        Number of records to process per batch. Controls how many records are sent
        to NetSuite in a single API call. Typical values: 50-200.
    internalIdLookup:
      type: object
      description: |-
        Configuration for looking up existing NetSuite records to match against incoming data.
        Required when operation is "update", "addupdate", or "delete".
      properties:
        extract:
          type: string
          description: Path in the source record to extract the lookup value from (e.g. "internalId" or "externalId").
          examples: ["externalId"]
        searchField:
          type: string
          description: NetSuite field to search against (e.g. "externalId", "email", "name", "tranId").
          examples: ["externalId"]
        operator:
          type: string
          description: Comparison operator for the lookup (e.g. "is", "contains", "startswith").
        expression:
          type: string
          description: NetSuite search expression for complex lookup conditions, used for multi-field or conditional lookups.
    hooks:
      type: object
      description: |
        Script hooks for custom processing at different stages of the import.
        Each hook references a SuiteScript file and function.
      properties:
        preMap:
          type: object
          description: Runs before field mapping is applied.
          properties:
            fileInternalId:
              type: string
              description: NetSuite internal ID of the SuiteScript file.
            function:
              type: string
              description: Name of the function to execute.
            configuration:
              type: object
              description: Configuration object passed to the hook function.
        postMap:
          type: object
          description: Runs after field mapping, before submission to NetSuite.
          properties:
            fileInternalId:
              type: string
              description: NetSuite internal ID of the SuiteScript file.
            function:
              type: string
              description: Name of the function to execute.
            configuration:
              type: object
              description: Configuration object passed to the hook function.
        postSubmit:
          type: object
          description: Runs after the record is submitted to NetSuite.
          properties:
            fileInternalId:
              type: string
              description: NetSuite internal ID of the SuiteScript file.
            function:
              type: string
              description: Name of the function to execute.
            configuration:
              type: object
              description: Configuration object passed to the hook function.
    mapping:
      type: object
      description: |
        Field mappings that define how source data fields map to NetSuite record fields.
        Contains both body-level fields and sublist (line-item) fields.
      properties:
        fields:
          type: array
          items:
            type: object
            properties:
              extract:
                type: string
                description: |
                  Path in the source record to extract the value from.
                  Use dot notation for nested fields (e.g., "address.city").
                examples: ["address.city"]
              generate:
                type: string
                description: |
                  The NetSuite field ID to write the value to (e.g., "companyname", "email", "subsidiary").
                examples: ["companyname"]
              hardCodedValue:
                type: string
                description: |
                  A static value to always use instead of extracting from source data.
                  Mutually exclusive with extract.
              lookupName:
                type: string
                description: Reference to a lookup defined in netsuite_da.lookups by name.
              dataType:
                type: string
                description: |
                  Data type hint for the field value (e.g., "string", "number", "date", "boolean").
              internalId:
                type: boolean
                description: When true, the value is a NetSuite internal ID reference.
              immutable:
                type: boolean
                description: When true, this field is only set on record creation, not on updates.
              discardIfEmpty:
                type: boolean
                description: When true, skip this field mapping if the extracted value is empty.
              extractDateFormat:
                type: string
                description: |
                  Date format of the extracted value (e.g., "MM/DD/YYYY", "ISO8601").
                  Used to parse date strings from source data.
              extractDateTimezone:
                type: string
                description: Timezone of the extracted date value (e.g., "America/New_York").
              subRecordMapping:
                type: object
                description: Nested mapping for NetSuite subrecord fields (e.g., address, inventory detail).
              conditional:
                type: object
                description: |
                  Conditional logic for when to apply this field mapping.
                properties:
                  lookupName:
                    type: string
                    description: Lookup to evaluate for the condition.
                  when:
                    type: string
                    enum:
                      - record_created
                      - record_updated
                      - extract_not_empty
                      - lookup_not_empty
                      - lookup_empty
                      - ignore_if_set
                    x-enumDescriptions:
                      record_created: Apply this mapping only when a new record is being created.
                      record_updated: Apply this mapping only when an existing record is being updated.
                      extract_not_empty: Apply this mapping only when the extracted source value is non-empty.
                      lookup_not_empty: Apply this mapping only when the lookup returns a value.
                      lookup_empty: Apply this mapping only when the lookup returns no value.
                      ignore_if_set: Skip this mapping if the target field already has a value.
                    description: Condition that controls when this field mapping is applied.
          description: |
            Body-level field mappings. Each entry maps a source field to a NetSuite body field.
        lists:
          type: array
          items:
            type: object
            properties:
              generate:
                type: string
                description: |
                  The NetSuite sublist ID (e.g., "item" for sales order line items,
                  "addressbook" for address sublists).
              jsonPath:
                type: string
                description: |
                  JSON path in the source data that contains the array of sublist records.
              fields:
                type: array
                items:
                  type: object
                  properties:
                    extract:
                      type: string
                      description: Path in the sublist record to extract the value from.
                    generate:
                      type: string
                      description: NetSuite sublist field ID to write to.
                    hardCodedValue:
                      type: string
                      description: Static value for this sublist field.
                    lookupName:
                      type: string
                      description: Reference to a lookup by name.
                    dataType:
                      type: string
                      description: Data type hint for the field value.
                    internalId:
                      type: boolean
                      description: When true, the value is a NetSuite internal ID reference.
                    isKey:
                      type: boolean
                      description: When true, this field is a key field for matching existing sublist lines.
                    immutable:
                      type: boolean
                      description: When true, this field is only set on record creation, not on updates.
                    discardIfEmpty:
                      type: boolean
                      description: When true, skips this field mapping if the extracted value is empty.
                    extractDateFormat:
                      type: string
                      description: Date format of the extracted value.
                    extractDateTimezone:
                      type: string
                      description: Timezone of the extracted date value.
                    subRecordMapping:
                      type: object
                      description: Nested mapping for subrecord fields within the sublist.
                    conditional:
                      type: object
                      description: Conditional logic for when to apply this sublist field mapping.
                      properties:
                        lookupName:
                          type: string
                          description: Lookup to evaluate for the condition.
                        when:
                          type: string
                          description: Condition that controls when this field mapping is applied.
                          enum:
                            - record_created
                            - record_updated
                            - extract_not_empty
                            - lookup_not_empty
                            - lookup_empty
                            - ignore_if_set
                          x-enumDescriptions:
                            record_created: Apply this mapping only when a new record is being created.
                            record_updated: Apply this mapping only when an existing record is being updated.
                            extract_not_empty: Apply this mapping only when the extracted source value is non-empty.
                            lookup_not_empty: Apply this mapping only when the lookup returns a value.
                            lookup_empty: Apply this mapping only when the lookup returns no value.
                            ignore_if_set: Skip this mapping if the target field already has a value.
                description: Field mappings for each column in the sublist.
          description: |
            Sublist (line-item) mappings. Each entry maps source data to a NetSuite sublist.
    lookups:
      type: array
      items:
        type: object
        properties:
          name:
            type: string
            description: |
              Unique name for this lookup, referenced by lookupName in field mappings.
            examples: ["lookupCustomerByEmail"]
          recordType:
            type: string
            description: |
              NetSuite record type to search (e.g., "customer", "item").
            examples: ["customer"]
          searchField:
            type: string
            description: |
              NetSuite field to search against (e.g., "email", "externalId", "name").
            examples: ["email"]
          resultField:
            type: string
            description: |
              Field from the lookup result to return (e.g., "internalId").
            examples: ["internalId"]
          expression:
            type: string
            description: |
              NetSuite search expression for complex lookup conditions.
          operator:
            type: string
            description: |
              Comparison operator (e.g., "is", "contains", "startswith").
          includeInactive:
            type: boolean
            description: When true, includes inactive records in lookup results.
          useDefaultOnMultipleMatches:
            type: boolean
            description: When true, use the default value if multiple records match the lookup.
          allowFailures:
            type: boolean
            description: When true, lookup failures do not stop the import.
          map:
            type: object
            description: Static value mapping for lookup results (key-value pairs).
          default:
            type: string
            description: Default value when lookup returns no results.
      description: |
        Lookup definitions used to resolve reference values from NetSuite.
        Referenced by name from field mappings via the lookupName property.
    rawOverride:
      type: object
      description: |
        Raw override object for advanced use cases. When useRawOverride is true,
        this object is sent directly to the NetSuite API, bypassing normal mapping.
    useRawOverride:
      type: boolean
      description: |
        When true, uses rawOverride instead of the normal mapping configuration.
    isMigrated:
      type: boolean
      description: When true, this import was migrated from a legacy format. Set by the system.
    retryUpdateAsAdd:
      type: boolean
      description: |
        When true, if an update fails because the record doesn't exist, automatically
        retry as an add operation. Useful for initial syncs where records may not exist yet.
  if:
    properties:
      operation:
        enum: [update, addupdate, delete]
    required:
      - operation
  then:
    required:
      - internalIdLookup
