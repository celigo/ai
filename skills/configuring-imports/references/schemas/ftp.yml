Ftp:
  type: object
  description: |-
    Defines where files are written on an FTP, FTPS, or SFTP server. Required when the
    _connectionId field references an FTP/SFTP connection; must not be included for other
    connection types. directoryPath selects the target folder and the file naming comes from
    the import's file configuration.
  required:
    - directoryPath
  properties:
    _tpConnectorId:
      type: string
      format: objectId
      x-celigo-refModel: tradingpartnerconnectors
      description: |-
        Trading Partner Connector that supplies partner-specific B2B settings for this import.
        When set, the import inherits the connector's pre-configured settings; omit to use only
        the FTP connection details.
      examples: ["60a2c4e6f321d800129a1a3c"]
    directoryPath:
      type: string
      x-celigo-agent:
        - handlebars
      x-celigo-ui-override: >-
        Required by the FTP import form (fieldDefinitions/resources/imports/ftp.js: ftp.directoryPath
        is required:true). Encoded to mirror the form so builders produce connectable configurations.
      description: |-
        Directory on the server where imported files are written, either absolute or relative to
        the login directory; the FTP user must have write permission on it. Use forward slashes
        regardless of server OS — paths are case-sensitive on UNIX/Linux servers. Supports
        handlebars templates.
      examples: ["users/dave", "incoming/orders", "/var/ftp/upload", "EDI/850"]
    fileName:
      type: string
      x-celigo-agent:
        - handlebars
      description: |-
        Name of the file written to the server, including its extension; do not include directory
        separators — the location comes from directoryPath. Supports handlebars placeholders such
        as items-{{timestamp}}.csv to generate a unique name per run.
      x-celigo-ai-guidance:
        - When the user does not specify a file naming convention, default to a timestamped filename such as "items-{{timestamp}}.csv" so each run produces a unique file and avoids overwriting previous files. Use a fixed filename only when the user explicitly requests overwriting or a fixed name.
      examples: ["items-{{timestamp}}.csv", "orders-{{date 'YYYYMMDD'}}.xml", "export.json"]
    inProgressFileName:
      type: string
      x-celigo-agent:
        - handlebars
      description: |-
        Temporary name the file carries while its upload is in progress, preventing other systems
        from processing a partially transferred file; it is renamed to its final name once the
        upload completes. Include a handlebars uniqueness token (e.g. {{timestamp}}) when one file
        is written per flow run.
      examples: ["items-{{timestamp}}.csv.inprogress", "upload.tmp"]
    backupDirectoryPath:
      type: string
      x-celigo-agent:
        - handlebars
      description: |-
        Directory on the same server where a copy of each written file is retained after a
        successful import; if omitted, no server-side backup is kept. Supports static paths or
        handlebars templates.
      examples: ["processed", "archive", "backup/{{date 'YYYY-MM'}}"]
