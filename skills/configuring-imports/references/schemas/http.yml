Http:
  type: object
  description: |-
    Configuration for HTTP imports.
    Required whenever the connection referenced by _connectionId has type http.
  properties:
    sendPostMappedData:
      type: boolean
      default: true
      description: |-
        When true, the request body is the record as reshaped by the import's mapping step. When false, the original pre-mapped record is sent instead, bypassing the mappings for the payload.
    isRest:
      type: boolean
      description: |-
        Internal flag indicating the import was built with the legacy REST form rather than the unified HTTP framework. Set by the form; not configured directly.
    strictHandlebarEvaluation:
      type: boolean
      description: |-
        When true, handlebars expressions that reference a missing field raise an error instead of rendering an empty string, surfacing mapping mistakes early rather than sending blank values.
    formType:
      type: string
      enum:
        - assistant
        - http
        - rest
        - graph_ql
        - assistant_graphql
      x-enumDescriptions:
        assistant: Assistant-guided form for systems with a Celigo connector available.
        http: Standard HTTP import form for generic HTTP endpoints.
        rest: Legacy REST form type for older imports not supported by the new HTTP framework.
        graph_ql: GraphQL import form for GraphQL API endpoints.
        assistant_graphql: Assistant-guided GraphQL form for systems with a connector that supports GraphQL.
      description: Determines the UI form and configuration experience for this import.
      examples:
        - assistant
        - http
        - rest
        - graph_ql
        - assistant_graphql
    type:
      type: string
      enum:
        - file
        - records
      x-enumDescriptions:
        file: Import handles raw file content such as binary data, PDFs, or images.
        records: Import handles structured record data such as JSON objects or XML records.
      description: |-
        Controls whether the import sends structured record data or raw file content.
        Most HTTP imports use records; use file only when importing raw file content that will be processed downstream.
      examples:
        - records
        - file
    requestMediaType:
      type: string
      enum:
        - xml
        - json
        - csv
        - urlencoded
        - form-data
        - octet-stream
        - plaintext
      x-enumDescriptions:
        xml: XML request body sent as application/xml.
        json: JSON request body sent as application/json, the most common format.
        csv: CSV data sent as text/csv.
        urlencoded: URL-encoded form data sent as application/x-www-form-urlencoded.
        "form-data": Multipart form data for file uploads and mixed content.
        "octet-stream": Raw binary data sent as application/octet-stream.
        plaintext: Plain text content sent as text/plain.
      description: |-
        Content type used to serialize the request body sent to the target API.
        Most REST APIs use json.
      examples:
        - json
        - xml
    _httpConnectorEndpointIds:
      type: array
      readOnly: true
      items:
        type: string
        format: objectId
        x-celigo-refModel: httpconnectorendpoints
      description: |
        HTTP connector endpoint IDs used by this import (multiple endpoints for different request
        types or operations). Set by the connector framework; client-supplied values are ignored.
    blobFormat:
      type: string
      enum:
        - utf8
        - ucs2
        - utf-16le
        - ascii
        - binary
        - base64
        - hex
      x-enumDescriptions:
        utf8: UTF-8 Unicode encoding, the universal default.
        ucs2: UCS-2 encoding for 16-bit Unicode characters.
        "utf-16le": UTF-16 Little Endian encoding.
        ascii: ASCII encoding for basic Latin characters (7-bit).
        binary: Raw binary encoding with no character conversion.
        base64: Base64 encoding for representing binary data as ASCII text.
        hex: Hexadecimal encoding representing each byte as two hex digits.
      description: |
        Character encoding format for blob/binary data imports.
        Only relevant when type is "file" or when handling binary content.
      examples:
        - utf8
        - base64
    batchSize:
      type: integer
      description: |-
        Maximum number of records submitted per HTTP request, which affects throughput and API rate limiting.
        REST services typically send one record per request; raise it only for batch endpoints or RPC/XML services that accept multiple records, consulting the target API documentation for the optimal value.
      examples:
        - 1
        - 10
        - 100
    successMediaType:
      type: string
      enum:
        - xml
        - json
        - plaintext
      x-enumDescriptions:
        xml: Expect XML-formatted success responses.
        json: Expect JSON-formatted success responses, the most common format.
        plaintext: Expect plain text success responses.
      description: Media type expected in successful responses from the target API. Most APIs return json.
      examples:
        - json
        - xml
    requestType:
      type: array
      items:
        type: string
        enum:
          - CREATE
          - UPDATE
      x-enumDescriptions:
        CREATE: Create new records in the destination system.
        UPDATE: Update existing records in the destination system.
      description: |-
        Operation type each request performs; for composite (upsert) imports, include both values.
        The array is positionally aligned with the relativeURI and method arrays — each index maps to one operation — and the existingExtract field determines which operation runs at runtime.
      examples:
        - [CREATE]
        - [UPDATE]
        - [UPDATE, CREATE]
    errorMediaType:
      type: string
      enum:
        - xml
        - json
        - plaintext
      x-enumDescriptions:
        xml: Expect XML-formatted error responses.
        json: Expect JSON-formatted error responses, the most common format.
        plaintext: Expect plain text error messages.
      description: Media type expected in error responses from the target API. Most APIs return json.
      examples:
        - json
        - xml
    relativeURI:
      type: array
      items:
        type: string
      x-celigo-agent:
        - handlebars
      x-celigo-handlebars-context: pre-mapped
      description: |-
        Relative URI path for each import request, as an array of strings (never an object); values can include Handlebars expressions for dynamic segments.
        Templates render against the pre-mapped record — the original input before the Import's mapping step — because URI construction usually needs business identifiers that mappings may rename or remove.
        For composite (upsert) imports, the array is positionally aligned with method and requestType, and existingExtract decides the index used at runtime: the UPDATE index when its field has a value, the CREATE index when it is empty or missing.
        Reference the existing record ID in the UPDATE URI with `{{{data.0.fieldName}}}` (triple braces with the data.0 prefix).
        Use separate array elements per operation rather than `{{#if}}` conditionals inside a single URI.
      examples:
        - ["/api/v1/customers"]
        - ["/customers/{{{data.0.shopifyCustomerId}}}.json", "/customers.json"]
    method:
      type: array
      items:
        type: string
        enum:
          - GET
          - PUT
          - POST
          - PATCH
          - DELETE
      x-enumDescriptions:
        GET: Retrieve data from the server (rarely used for imports).
        PUT: Replace an existing resource entirely.
        POST: Create a new resource, the most common method for imports.
        PATCH: Partially update an existing resource.
        DELETE: Remove a resource from the server.
      description: |-
        HTTP method used for each import request.
        For composite (upsert) imports, the array is positionally aligned with relativeURI and requestType — e.g. `["PUT", "POST"]` with `requestType: ["UPDATE", "CREATE"]` uses PUT for updates and POST for creates.
      examples:
        - [POST]
        - [PUT, POST]
    _httpConnectorVersionId:
      type: string
      format: objectId
      readOnly: true
      description: HTTP connector version used by this import. Set by the connector framework; client-supplied values are ignored (write-tested).
    _httpConnectorResourceId:
      type: string
      format: objectId
      readOnly: true
      description: HTTP connector resource used by this import. Set by the connector framework; client-supplied values are ignored (write-tested).
    _httpConnectorEndpointId:
      type: string
      format: objectId
      readOnly: true
      x-celigo-refModel: httpconnectorendpoints
      description: HTTP connector endpoint used by this import (single endpoint). Set by the connector framework; client-supplied values are ignored (write-tested).
    body:
      type: array
      items:
        type: object
      description: |-
        Request body template for the import.
        Leave undefined for standard imports — the Import's mapping step transforms the source record and the mapped data is sent as the request body automatically.
        Set it only when the target API requires XML, SOAP, or a custom structure that mappings cannot produce, or when the user explicitly specifies a request body.
        When set, the mapping step still runs first and the template renders against the post-mapped record — use `{{record.<mappedField>}}` to reference mapping outputs.
        Hand-templated bodies are harder to maintain and debug than mappings; when in doubt, leave this field undefined.
      examples:
        - [{ "name": "{{record.name}}", "email": "{{record.email}}" }]
    ignoreEmptyNodes:
      type: boolean
      description: |-
        When true, fields with empty values are stripped from the request body before it is sent,
        so the target API receives only populated fields. Shown as "Remove empty fields from HTTP
        request body" in the UI.
      examples: [true, false]
    existingExtract:
      type: string
      description: |-
        Field name or JSON path that drives the upsert decision for composite imports with both CREATE and UPDATE in requestType.
        When the field has a value in the incoming record, the UPDATE operation's relativeURI and method are used; when it is empty or missing, the CREATE operation runs.
        Must match a field populated by an upstream lookup or response mapping (e.g. a destination system ID like "shopifyCustomerId"); omit for single-operation imports.
      examples:
        - "shopifyCustomerId"
        - "netsuite_id"
        - "existingRecordId"
    existingLookupName:
      type: string
      description: |-
        Name of an entry in `lookups` that resolves whether each record already exists in the destination, driving the composite upsert decision when `existingExtract` alone is insufficient (e.g. the check requires a call to the target system). Paired with composite CREATE/UPDATE imports.
      examples:
        - "lookupCustomerByEmail"
    ignoreExtract:
      type: string
      description: |
        JSON path to the field in the record that is used to determine if the record already exists.
        Only used when ignoreMissing or ignoreExisting is set.
    endPointBodyLimit:
      type: integer
      description: |
        Maximum size limit for the request body in bytes.
        Used to enforce API-specific size constraints.
    headers:
      type: array
      items:
        type: object
        properties:
          name:
            type: string
            description: Name of the HTTP header to include with each import request.
          value:
            type: string
            description: Value sent for the header. Supports handlebars expressions rendered against the pre-mapped record.
            x-celigo-agent:
              - handlebars
            x-celigo-handlebars-context: pre-mapped
      description: |-
        Custom HTTP headers included with import requests; values can contain Handlebars expressions.
        Value templates render against the pre-mapped record (the original input before the Import's mapping step) — use `{{record.<field>}}` to reference fields as they appear in the upstream source.
      examples:
        - [{ "name": "X-Custom-Header", "value": "custom-value" }]
    response:
      type: object
      properties:
        resourcePath:
          type: array
          items:
            type: string
          description: |
            JSON path to the resource collection in the response.
            Required when batchSize > 1.
        resourceIdPath:
          type: array
          items:
            type: string
          description: |
            JSON path to the ID field in each resource.
            If not specified, system looks for "id" or "_id" fields.
        successPath:
          type: array
          items:
            type: string
          description: |
            JSON path to a field that indicates success.
            Used for APIs that don't rely solely on HTTP status codes.
        successValues:
          type: array
          items:
            type: array
            items:
              type: string
          description: |
            Values at successPath that indicate success.
        failPath:
          type: array
          items:
            type: string
          description: |
            JSON path to a field that indicates failure (even if status=200).
        failValues:
          type: array
          items:
            type: array
            items:
              type: string
          description: |
            Values at failPath that indicate failure.
        errorPath:
          type: string
          description: |
            JSON path to error message in the response.
        allowArrayforSuccessPath:
          type: boolean
          description: When true, allows array values at successPath during success evaluation.
        hasHeader:
          type: boolean
          description: When true, treats the first record in the response as a header row (for CSV responses).
      description: |
        Configuration for parsing and interpreting HTTP responses.
    _asyncHelperId:
      type: string
      format: objectId
      x-celigo-refModel: asynchelpers
      description: |
        Reference to an AsyncHelper resource for handling asynchronous import operations.

        Used when the target API uses a "fire-and-check-back" pattern (HTTP 202, polling, etc.).
    ignoreLookupName:
      type: string
      description: |-
        Name of an entry in `lookups` used to check whether each record already exists, so `ignoreMissing`/`ignoreExisting` can skip it. Use it instead of `ignoreExtract` when existence must be resolved by a call to the target system rather than read from a field on the incoming record.
      examples:
        - "lookupExistingOrder"
    lookups:
      x-celigo-agent:
        - lookup
      description: |-
        Lookups referenced by `existingLookupName`/`ignoreLookupName` to resolve record existence against the destination system at runtime.
      allOf:
        - $ref: ../../../common/schemas/lookups.yml#/Lookups
