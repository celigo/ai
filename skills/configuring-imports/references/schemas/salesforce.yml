Salesforce:
  type: object
  description: |-
    Salesforce-specific configuration for the import: the operation to perform, the API to use, and object-level settings such as `sObjectType`, `idLookup`, and `upsert`. Properties like `ignoreExisting`, `ignoreMissing`, `name`, and `description` are not part of this object — they belong at the import level.
  required:
    - operation
    - api
  properties:
    lookups:
      # Live: array of lookup configs (matches common Lookups), not a string.
      $ref: '../../../common/schemas/lookups.yml#/Lookups'
    operation:
      type: string
      enum:
        - insert
        - update
        - upsert
        - upsertpicklistvalues
        - delete
        - addupdate
      x-lowercase: true
      x-enumDescriptions:
        insert: Create new records in Salesforce.
        update: Modify existing records in Salesforce, identified by record ID.
        upsert: Create or update records based on an External ID field match.
        upsertpicklistvalues: Create or update picklist values on a Salesforce field.
        delete: Remove records from Salesforce, moving them to the recycle bin.
        addupdate: Create new or update existing records using Celigo-specific matching logic.
      x-celigo-ui-override: >-
        Required by the Salesforce import form (operation is required:true). Encoded to mirror the
        form so builders produce connectable configurations.
      description: |-
        Controls how records are written to Salesforce. Each value pairs with a lookup strategy: `upsert` requires `upsert.externalIdField` plus `idLookup.extract`, while `update`, `delete`, `addupdate`, and `insert` with `ignoreExisting` require `idLookup.whereClause`. Values are converted to lowercase automatically.
    api:
      type: string
      enum:
        - soap
        - rest
        - metadata
        - compositerecord
      x-lowercase: true
      x-enumDescriptions:
        soap: Salesforce SOAP API with AllOrNone transaction control support.
        rest: Standard Salesforce REST API for single-record and small-batch operations.
        metadata: Salesforce Metadata API for deploying configuration and setup data, not data records.
        compositerecord: Salesforce Composite Graph API for creating related record trees atomically.
      x-celigo-ui-override: >-
        Required by the Salesforce import form (api is required:true, default soap). Encoded to
        mirror the form so builders produce connectable configurations.
      description: |-
        Selects the Salesforce API used to execute the import. Use `soap` for most imports and another API only when its specific capability is needed; default to `soap` when no API is specified. Values are converted to lowercase automatically.
    soap:
      type: object
      properties:
        headers:
          type: object
          properties:
            allOrNone:
              type: boolean
              description: |-
                When true, the batch is processed atomically: if any record fails, the entire transaction is rolled back and nothing is committed. When false or omitted, records that succeed are committed even if others in the batch fail.
          description: SOAP headers included in requests sent to Salesforce, such as the `allOrNone` transaction-control header.
        batchSize:
          type: number
          description: |-
            Number of records sent to Salesforce in each SOAP API batch. Larger batches reduce the number of API calls; smaller batches reduce per-call load and the chance of timeouts.
      description: Settings that apply when `api` is `soap`, including SOAP request headers and batch size.
    sObjectType:
      type: string
      description: |-
        Salesforce object the import writes to, such as `Account`, `Contact`, or a custom object like `Vendor__c`. Must exactly match the object's case-sensitive API name; custom objects include the `__c` suffix.
      examples: ["Account", "Contact", "Vendor__c"]
    idLookup:
      type: object
      properties:
        extract:
          type: string
          description: |-
            Field in the incoming data whose value is matched against the Salesforce External ID field named in `upsert.externalIdField`. Set only when `operation` is `upsert`; all other operations use `whereClause` instead. Choose a field that is unique and always populated — missing or null values cause the upsert to fail. If both `extract` and `whereClause` are set, `extract` takes precedence for upsert.
          examples: ["externalId"]
        whereClause:
          type: string
          x-celigo-agent:
            - handlebars
          description: |-
            SOQL condition (without the `WHERE` keyword) that finds existing Salesforce records for each incoming record. Required when `operation` is `update`, `delete`, or `addupdate`, and for `insert` with `ignoreExisting`; for `upsert`, use `extract` instead. Reference incoming fields with triple-brace Handlebars and wrap string values in single quotes (e.g. `Email = '{{{Email}}}'`) — triple braces emit the raw value without HTML-escaping, which would corrupt characters like `&` or `'`. Combine conditions with `AND`/`OR`.
          examples: ["Email = '{{{Email}}}'", "External_Id__c = '{{{externalId}}}'"]
      description: |-
        Controls how existing Salesforce records are matched before writing. Set exactly one of `extract` (for `upsert`) or `whereClause` (for `update`, `delete`, `addupdate`, and `insert` with `ignoreExisting`); omit for plain inserts.
    upsert:
      type: object
      properties:
        externalIdField:
          type: string
          description: |-
            API name of the Salesforce field, marked as External ID, that upsert operations match against. This is the target side of the match; `idLookup.extract` names the source field in the incoming data. If the value matches multiple Salesforce records, the upsert fails.
          examples: ["External_Id__c"]
      description: |-
        Upsert matching configuration, required when `operation` is `upsert` and omitted for all other operations. Contains only `externalIdField`, which pairs with `idLookup.extract` at the parent level.
    upsertpicklistvalues:
      type: object
      properties:
        type:
          type: string
          enum:
            - picklist
            - multipicklist
          x-lowercase: true
          x-enumDescriptions:
            picklist: Standard single-select picklist allowing one value at a time.
            multipicklist: Multi-select picklist allowing multiple values separated by semicolons.
          description: Picklist field type being managed. Values are converted to lowercase automatically.
        fullName:
          type: string
          description: |-
            Fully qualified API name of the picklist field, in `ObjectName.FieldName__c` form (for example, `Account.MyPicklist__c`). Must match the case-sensitive Salesforce API name.
          examples: ["Account.MyPicklist__c"]
        label:
          type: string
          description: Display label for the picklist field in the Salesforce UI. Can contain spaces and does not need to match the API name.
        visibleLines:
          type: number
          description: |-
            Number of values visible without scrolling in the Salesforce UI selection box. Only applies when `type` is `multipicklist`.
      description: |-
        Picklist field definition managed when `operation` is `upsertpicklistvalues`; omit for all other operations. Manages the field's metadata — name, label, and display settings — and requires Salesforce Metadata API permissions.
    removeNonSubmittableFields:
      type: boolean
      description: |-
        When true, strips fields Salesforce will not accept — read-only, system-generated, and formula fields — from the payload before submission, preventing rejection errors. When false or omitted, all fields are submitted as-is. Only the outgoing payload is affected; the source data is unchanged.
    document:
      type: object
      properties:
        id:
          type: string
          description: |-
            Salesforce-assigned ID of the Document record. The 15-character form is case-sensitive; the 18-character form adds a case-insensitivity checksum.
        name:
          type: string
          description: Display name of the document in Salesforce, used to identify it in folders, search, and API operations.
        folderId:
          type: string
          description: |-
            Salesforce folder that stores the document. The document inherits the folder's sharing and visibility settings; changing this value moves the document to a different folder.
        contentType:
          type: string
          description: MIME type of the document content, such as `application/pdf` or `image/png`.
        developerName:
          type: string
          description: |-
            Unique API name used to reference the document in code, metadata, and integrations. Distinct from the display name; uses only letters, numbers, and underscores with no spaces.
        isInternalUseOnly:
          type: boolean
          description: When true, marks the document for internal use only — it must not be shared with parties outside the organization.
        isPublic:
          type: boolean
          description: When true, the document is accessible to all users; when false, access is limited to authorized users by Salesforce permissions and sharing settings.
      description: |-
        Salesforce Document record written by the import, combining the file content with metadata such as name, folder, and content type.
    attachment:
      type: object
      properties:
        id:
          type: string
          description: |-
            Salesforce-assigned ID of the Attachment record. Prefer the 18-character case-insensitive form over the 15-character case-sensitive form in integrations.
        name:
          type: string
          description: Filename of the attachment, including the file extension (for example, `contract_agreement.pdf`).
        parentId:
          type: string
          description: |-
            Salesforce record the attachment is linked to, such as an Account, Contact, or Opportunity. Required when creating an attachment; access to the attachment follows the parent record's permissions.
        contentType:
          type: string
          description: MIME type of the attachment content, such as `application/pdf` or `image/png`.
        isPrivate:
          type: boolean
          description: |-
            When true, the attachment is visible only to users explicitly authorized to access it; when false or omitted, it inherits the visibility of its parent record. This setting only restricts access further — it never grants access beyond the parent record's permissions.
        description:
          type: string
          description: Free-text note describing the attachment's content or purpose, shown alongside the attachment details in Salesforce.
      description: |-
        Salesforce Attachment record written by the import — a file linked to a parent record via `parentId`, with metadata such as name and content type.
    contentVersion:
      type: object
      properties:
        contentDocumentId:
          type: string
          description: |-
            ContentDocument this version belongs to; all versions of the same document share this ID. Assigned by Salesforce when the content version is created and immutable afterward.
        title:
          type: string
          description: Display title of this content version, shown in content libraries, search results, and version history.
        pathOnClient:
          type: string
          description: |-
            Original file path on the client machine before upload. Used for reference and display only; it does not affect how the file is stored or accessed in Salesforce.
        tagCsv:
          type: string
          description: |-
            Comma-separated tags applied to the content version for categorization and search. Updating this field replaces the entire tag set, so include every tag the version should keep.
        contentLocation:
          type: string
          description: Specifies where the content file for this ContentVersion record is stored — "S" for Salesforce internal storage or "E" for an external system (the two values the import form offers). Salesforce also defines "L" for content shared via a link, but the form does not set it. Typically assigned automatically based on the upload method.
      description: |-
        Salesforce ContentVersion record written by the import — a specific version of a content item in Salesforce Files. Each modification produces a new version, and all versions of a document are linked through `contentDocumentId`.
  if:
    properties:
      operation:
        const: upsert
    required:
      - operation
  then:
    required:
      - upsert
      - idLookup
  else:
    if:
      properties:
        operation:
          enum: [update, delete, addupdate]
      required:
        - operation
    then:
      required:
        - idLookup
