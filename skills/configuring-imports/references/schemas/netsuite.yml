        searchField:
          type: string
          description: The NetSuite record field used as the key attribute for the internal ID lookup search. Should be a unique or indexed field to ensure accurate matches. Must correspond to a valid, searchable field on the target record type.
        expression:
          type: string
          description: |-
            A string representing a search expression used to filter or query records within the NetSuite system based on specific criteria. This expression defines the precise conditions that records must meet to be included in the search results, enabling targeted and efficient data retrieval. It supports a rich syntax including logical operators (AND, OR, NOT), comparison operators (=, !=, >, <, >=, <=), field references, and literal values. Expressions can be nested to form complex queries tailored to specific business needs, allowing for granular control over the search logic. This property is essential for performing internal lookups by matching records against the defined criteria, ensuring that only relevant records are returned.

            **Field behavior**
            - Defines the criteria for searching or filtering records by specifying one or more conditions.
            - Supports logical operators such as AND, OR, and NOT to combine multiple conditions logically.
            - Allows inclusion of field names, comparison operators, and literal values to construct meaningful expressions.
            - Enables nested expressions for advanced querying capabilities.
            - Used internally to perform lookups by matching records against the defined expression.
            - Returns records that satisfy all specified conditions within the expression.
            - Evaluates expressions dynamically at runtime to reflect current data states.
            - Supports referencing related record fields to enable cross-record filtering.

            **Implementation guidance**
            - Ensure the expression syntax strictly conforms to NetSuite’s search expression format and supported operators.
            - Validate the expression prior to execution to catch syntax errors and prevent runtime failures.
            - Use parameterized values or safe input handling to mitigate injection risks and enhance security.
            - Support and correctly parse nested expressions to handle complex query scenarios.
            - Implement graceful handling for cases where the expression yields no matching records, avoiding errors.
            - Optimize expressions for performance by limiting complexity and avoiding overly broad criteria.
            - Provide clear error messages or feedback when expressions are invalid or unsupported.
            - Consider caching frequently used expressions to improve lookup efficiency.

            **Examples**
            - `"status = 'Open' AND type = 'Sales Order'"`
            - `"createdDate >= '2023-01-01' AND createdDate <= '2023-12-31'"`
