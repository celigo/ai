            - `"NOT (status = 'Closed' OR status = 'Cancelled')"`
            - `"amount > 1000 AND (priority = 'High' OR priority = 'Urgent')"`
            - `"item.category = 'Electronics' AND quantity >= 10"`
            - `"lastModifiedDate >
      description: |-
        internalIdLookup is a boolean property that specifies whether the lookup operation should utilize the unique internal ID assigned by NetSuite to an entity for record retrieval. When set to true, the system treats the provided identifier strictly as this immutable internal ID, enabling precise and unambiguous access to the exact record. This approach is essential in scenarios demanding high accuracy and reliability, as internal IDs are guaranteed to be unique within the NetSuite environment and remain consistent over time. If set to false or omitted, the lookup defaults to using external identifiers, display names, or other non-internal keys, which may be less precise and could lead to multiple matches or ambiguity in the results.

        **Field behavior**
        - Activates strict matching using NetSuite’s unique internal ID when true.
        - Defaults to external or display identifier matching when false or not specified.
        - Changes the lookup logic and matching criteria based on the flag’s value.
        - Ensures efficient, accurate, and unambiguous record retrieval by leveraging stable internal identifiers.

        **Implementation guidance**
        - Enable only when the exact internal ID of the target record is known, verified, and appropriate for the lookup.
        - Avoid setting to true if only external or display identifiers are available to prevent failed or incorrect lookups.
        - Confirm that the internal ID corresponds to the correct record type to avoid mismatches or errors.
        - Validate the format and existence of the internal ID before performing the lookup operation.
        - Implement comprehensive error handling to manage cases where the internal ID is invalid, missing, or does not correspond to any record.

        **Examples**
        - `internalIdLookup: true` — Retrieve a customer record by its NetSuite internal ID for precise identification.
        - `internalIdLookup: false` — Search for an inventory item using its external SKU or descriptive name.
        - Omitting `internalIdLookup` defaults to false, causing the system to perform lookups based on external or display identifiers.

        **Important notes**
        - Internal IDs are stable, unique, and system-generated identifiers within NetSuite, providing the most reliable reference for records.
        - Using internal IDs can improve lookup performance and reduce ambiguity compared to relying on external or display identifiers.
        - Incorrectly setting this flag to true with non-internal IDs will likely result in lookup failures or no matching records found.
        - This property is specific to NetSuite integrations and may not be applicable or recognized in other systems or contexts.
        - Ensure synchronization between the internal ID used and the expected record type to maintain data integrity and
    preferences:
      type: object
      properties:
        ignoreReadOnlyFields:
          type: boolean
          description: When true, silently skips read-only fields during update operations instead of raising errors.
        warningAsError:
          type: boolean
          description: When true, treats NetSuite warnings as errors, causing the operation to fail immediately.
        skipCustomMetadataRequests:
          type: boolean
          description: When true, skips custom metadata requests during NetSuite API operations to improve performance.
      description: |-
        An object encapsulating the user's customizable settings and options within the NetSuite environment, enabling a highly personalized and efficient user experience. This object encompasses a broad spectrum of configurable preferences including interface layout, language, timezone, notification methods, default currencies, date and time formats, themes, and other user-specific options that directly influence how the system behaves, appears, and interacts with the individual user. Preferences are designed to be flexible, supporting inheritance from role-based or system-wide defaults while allowing users to override settings to suit their unique workflows and requirements. The preferences object supports dynamic retrieval and partial updates, ensuring that changes can be made granularly without affecting unrelated settings, thereby maintaining data integrity and user experience consistency.

        **Field behavior**
        - Contains user-specific configuration settings that tailor the NetSuite experience to individual needs and roles.
        - Includes preferences related to UI layout, notification settings, default currencies, date/time formats, language, themes, and other personalization options.
        - Supports dynamic retrieval and partial updates, enabling users to modify individual preferences without overwriting the entire object.
        - Allows inheritance of preferences from role-based or system-wide defaults when user-specific settings are not explicitly defined.
        - Changes to preferences immediately affect the user interface, notification delivery, data presentation, and overall system behavior.
        - Preferences persist across sessions and devices, ensuring a consistent user experience.
        - Supports both simple scalar values and complex nested structures to accommodate diverse configuration needs.

        **Implementation guidance**
        - Structure as a nested JSON object with clearly defined and documented sub-properties grouped by categories such as notifications, display settings, localization, and system defaults.
        - Validate all input during updates to ensure data integrity, prevent invalid configurations, and maintain system stability.
        - Implement partial update mechanisms (e.g., PATCH semantics) to allow granular and efficient modifications.
        - Enforce strict access controls to ensure only authorized users can view or modify preferences.
        - Consider versioning the preferences schema to support backward compatibility and future enhancements.
