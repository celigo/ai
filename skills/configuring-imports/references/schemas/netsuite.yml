        fileType:
          type: string
          description: |-
            The fileType property specifies the precise format or category of the file managed within the NetSuite file system, such as PDF, CSV, JPEG, or other supported types. This designation is essential because it directly affects how the system processes, displays, stores, and interacts with the file throughout its lifecycle. Correctly identifying the fileType ensures that files are rendered correctly in the user interface, processed through appropriate workflows, and subjected to any file-specific restrictions, permissions, or validations. It is typically required when uploading or creating new files to guarantee compatibility, prevent errors during file operations, and maintain data integrity. Additionally, the fileType influences system behaviors such as indexing, searchability, and integration with other NetSuite modules or external systems.

            **Field behavior**
            - Defines the file’s format or category, governing system handling, processing, and display.
            - Determines rendering, storage methods, and permissible manipulations within NetSuite.
            - Enables or restricts specific operations based on the file type’s inherent capabilities and limitations.
            - Usually mandatory during file creation or upload to ensure accurate system recognition and handling.
            - Influences validation checks, error handling, and workflow routing during file operations.
            - Affects integration points with other NetSuite features, such as reporting, scripting, or external API interactions.

            **Implementation guidance**
            - Validate the fileType against a predefined list of supported NetSuite file types to ensure compatibility and prevent errors.
            - Ensure the fileType accurately reflects the actual content format of the file to avoid processing failures or data corruption.
            - Prefer using standardized MIME types or NetSuite-specific identifiers where applicable for consistency and interoperability.
            - Implement robust error handling to gracefully manage unsupported, unrecognized, or mismatched file types.
            - Consider system versioning, configuration differences, and customizations that may affect supported file types.
            - When changing fileType post-creation, ensure appropriate reprocessing or format conversion to maintain data integrity.

            **Important notes**
            - Consistency between the fileType and the actual file content
        folder:
          type: string
          description: |-
            The identifier or path of the folder within the NetSuite file cabinet where the file is stored or intended to be stored. This property precisely defines the file's storage location, enabling organized management, categorization, and efficient retrieval within the NetSuite environment. It supports specification either as a unique numeric folder ID or as a string representing the folder path, accommodating both absolute and relative references depending on the API context. Proper assignment ensures files are correctly placed within the hierarchical folder structure, facilitating access control, streamlined file operations, and maintaining organizational consistency.

            **Field behavior**
            - Specifies the exact folder location for storing or moving the file within the NetSuite file cabinet.
            - Accepts either a numeric folder ID for unambiguous identification or a string folder path for hierarchical referencing.
            - Mandatory when uploading new files or relocating existing files to define their destination.
            - Optional during file metadata retrieval if folder context is implicit or not required.
            - Updating this property on an existing file triggers relocation to the specified folder.
            - Influences file visibility and access permissions based on folder-level security settings.
            - Supports both absolute and relative folder path formats depending on API usage context.

            **Implementation guidance**
            - Confirm the target folder exists and is accessible within the NetSuite file cabinet before assignment.
            - Prefer using the internal numeric folder ID to avoid ambiguity and ensure precise targeting.
            - Support both absolute and relative folder paths where the API context allows.
            - Enforce permission validation to verify that the user or integration has adequate rights to access or modify the folder.
            - Normalize folder paths to comply with NetSuite’s hierarchical structure and naming conventions.
            - Provide informative error responses if the folder is invalid, non-existent, or access is denied.
            - When moving files by updating this property, ensure that any dependent metadata or references are updated accordingly.

            **Examples**
            - "123" (numeric folder ID representing a specific folder)
            - "/Documents/Invoices" (string folder path indicating a nested folder structure)
            - "456" (numeric folder ID for a project-specific folder)
            - "Shared/Marketing/Assets" (relative folder path within the file cabinet hierarchy)

            **Important notes**
            - Folder IDs are unique within the NetSuite account and are the recommended method for precise folder referencing.
            - Folder paths must conform to NetSuite’s naming standards and reflect the correct folder hierarchy.
            - Changing the folder property on an existing file effectively moves the file within the file cabinet.
            - Adequate permissions are required to access or modify the specified folder;
        folderInternalId:
          type: string
          description: |-
            The internal identifier of the folder within the NetSuite file cabinet where the file is stored. This unique, system-generated integer ID precisely specifies the folder location, enabling accurate file operations such as upload, download, retrieval, and organization. It is essential for associating files with their respective folders and maintaining the hierarchical structure of the file cabinet, ensuring consistent file management and access control.

            **Field behavior**
            - Represents a unique, system-assigned internal ID for a folder in the NetSuite file cabinet.
            - Required to specify or retrieve the exact folder location during file management operations.
            - Must correspond to an existing folder within the NetSuite account to ensure valid file placement.
            - Changing this ID effectively moves the file to a different folder within the file cabinet.
            - Permissions on the folder influence access and operations on the associated files.
            - The field is mandatory when creating or updating a file to define its storage location.
            - Supports hierarchical folder structures by linking files to nested folders via their internal IDs.

            **Implementation guidance**
            - Validate that the folderInternalId is a valid integer and corresponds to an existing folder before use.
            - Retrieve valid folder internal IDs through NetSuite’s SuiteScript, REST API, or UI to avoid errors.
            - Implement error handling for cases where the folderInternalId is missing, invalid, or points to a restricted folder.
            - Update this ID carefully, as it changes the file’s folder location and may affect file accessibility.
            - Ensure that the user or integration has appropriate permissions to access or modify the target folder.
            - When moving files between folders, confirm that the destination folder supports the file type and intended use.
            - Cache or store folderInternalId values cautiously to prevent stale references in dynamic folder structures.

            **Examples**
            - 12345
            - 67890
            - 101112

            **Important notes**
            - This ID is distinct from the folder name; it is a system-generated unique identifier.
            - Modifying the folderInternalId moves the file to a different folder, impacting file organization.
            - Folder permissions and sharing settings can restrict or enable file operations based on this ID.
            - Accurate use of this ID is critical for maintaining the integrity of the file cabinet’s folder hierarchy.
