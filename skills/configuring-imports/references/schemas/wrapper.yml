Wrapper:
  type: object
  description: |-
    Configuration for Wrapper imports, which delegate writing records to custom connector code
    (typically a stack-hosted function) rather than a built-in adaptor. Required when the
    _connectionId field references a wrapper connection.
  required:
    - function
  properties:
    function:
      type: string
      x-celigo-ui-override: >-
        Required by the wrapper import form (wrapper.function is required:true). Encoded to mirror
        the form so builders produce connectable configurations.
      description: |-
        Name of the function the wrapper invokes to process records.
        Must match a callable function in the wrapper's execution context; names are case-sensitive.
      examples: ["importItem", "createFulfillmentsForPending", "sendMessage"]
    configuration:
      type: object
      additionalProperties: true
      description: |-
        Free-form settings passed to the wrapper function at runtime (connector-specific keys such
        as method, apiVersion, headers, or handler). Structure is defined by the wrapper code, not
        by this schema.
    lookups:
      $ref: ../../../common/schemas/lookups.yml#/Lookups
