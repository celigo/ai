Dynamodb:
  type: object
  description: |-
    Configuration for DynamoDB imports. Required when the _connectionId field references a
    DynamoDB connection; must not be included for other connection types. putItem writes a full
    item document; updateItem modifies named attributes of an existing item identified by its
    key.
  required:
    - region
    - method
    - tableName
  properties:
    region:
      type: string
      x-lowercase: true
      enum: ["us-east-1", "us-east-2", "us-west-1", "us-west-2", "af-south-1", "ap-east-1", "ap-south-1", "ap-northeast-1", "ap-northeast-2", "ap-northeast-3", "ap-southeast-1", "ap-southeast-2", "ca-central-1", "eu-central-1", "eu-west-1", "eu-west-2", "eu-west-3", "eu-south-1", "eu-north-1", "me-south-1", "sa-east-1"]
      x-enumDescriptions:
        us-east-1: US East (N. Virginia).
        us-east-2: US East (Ohio).
        us-west-1: US West (N. California).
        us-west-2: US West (Oregon).
        af-south-1: Africa (Cape Town).
        ap-east-1: Asia Pacific (Hong Kong).
        ap-south-1: Asia Pacific (Mumbai).
        ap-northeast-1: Asia Pacific (Tokyo).
        ap-northeast-2: Asia Pacific (Seoul).
        ap-northeast-3: Asia Pacific (Osaka).
        ap-southeast-1: Asia Pacific (Singapore).
        ap-southeast-2: Asia Pacific (Sydney).
        ca-central-1: Canada (Central).
        eu-central-1: Europe (Frankfurt).
        eu-west-1: Europe (Ireland).
        eu-west-2: Europe (London).
        eu-west-3: Europe (Paris).
        eu-south-1: Europe (Milan).
        eu-north-1: Europe (Stockholm).
        me-south-1: Middle East (Bahrain).
        sa-east-1: South America (Sao Paulo).
      default: "us-east-1"
      x-celigo-ui-override: >-
        Required by the DynamoDB import form (dynamodb.region is required:true, default us-east-1).
        Encoded to mirror the form so builders produce connectable configurations.
      description: |-
        AWS region hosting the DynamoDB table. Determines the service endpoint used for all
        requests and must match the region where the table is deployed.
      examples: ["us-east-1", "eu-west-1", "ap-southeast-2"]
    method:
      type: string
      enum:
      - putItem
      - updateItem
      x-enumDescriptions:
        putItem: Create a new item or replace an existing item entirely in the DynamoDB table.
        updateItem: Modify specific attributes of an existing item in the DynamoDB table without replacing it.
      x-celigo-ui-override: >-
        Required by the DynamoDB import form (dynamodb.method is required:true). Encoded to mirror
        the form so builders produce connectable configurations.
      description: Write operation performed against the DynamoDB table for each record.
    tableName:
      type: string
      x-celigo-ui-override: >-
        Required by the DynamoDB import form (dynamodb.tableName is required:true). Encoded to
        mirror the form so builders produce connectable configurations.
      description: |-
        DynamoDB table that receives the imported records.
        Must match an existing table in the target AWS account and region; table names are case-sensitive.
      examples: ["Customers", "Orders", "Product-Catalog"]
    partitionKey:
      type: string
      x-celigo-agent:
        - handlebars
      x-celigo-ui-override: >-
        Required by the DynamoDB import form when method is updateItem (dynamodb.partitionKey
        required, visibleWhen method=updateItem).
      description: |-
        Value of the target item's partition key for the updateItem operation; together with
        sortKey (when the table defines one) it identifies the item each record writes to.
        Supports handlebars to reference the incoming record's fields.
      examples: ["{{record.id}}", "{{record.customerId}}"]
    sortKey:
      type: string
      x-celigo-agent:
        - handlebars
      description: |-
        Value of the target item's sort key; supports handlebars. Omit when the table defines only
        a partition key.
      examples: ["{{record.timestamp}}", "{{record.lineId}}"]
    itemDocument:
      type: string
      x-celigo-agent:
        - handlebars
      description: |-
        JSON document written to the table for the putItem operation, containing all attribute
        names and values for the item, including its key attributes. Supports handlebars.
      examples: ['{"id": "{{record.id}}", "name": "{{record.name}}", "total": {{record.total}}}']
    updateExpression:
      type: string
      x-celigo-ui-override: >-
        Required by the DynamoDB import form when method is updateItem (dynamodb.updateExpression
        required, visibleWhen method=updateItem).
      description: |-
        DynamoDB update expression naming which attributes to set, add, or remove on the item for
        the updateItem operation. Only the named attributes change; reference attribute names and
        values through the expressionAttributeNames and expressionAttributeValues placeholders.
      examples: ["SET #name = :name, #total = :total", "SET #status = :status REMOVE #temp"]
    conditionExpression:
      type: string
      description: |-
        Condition evaluated against the existing item before the write executes.
        When the condition evaluates to false, the operation is aborted and no changes are made.
      examples: ["attribute_not_exists(#pk)", "#version = :expectedVersion"]
    expressionAttributeNames:
      type: string
      description: |-
        JSON placeholder-to-name map for attribute names referenced in expressions, for example {"#N": "Name"}.
        Use it when an attribute name is a reserved word or contains special characters; placeholder keys start with #.
      examples: ['{"#name": "Name", "#status": "status"}']
    expressionAttributeValues:
      type: string
      x-celigo-agent:
        - handlebars
      description: |-
        JSON placeholder-to-value map for attribute values referenced in expressions; placeholder
        keys start with a colon (e.g. ":val") and each value is a DynamoDB attribute-value object
        such as {"S": "text"}. Supports handlebars.
      examples: ['{":name": {"S": "{{record.name}}"}, ":total": {"N": "{{record.total}}"}}']
    ignoreExtract:
      type: string
      x-celigo-agent:
        - handlebars
      description: |-
        Path to the field in the source record used to determine whether the record already exists.
        Only used when ignoreExisting is set on the import.
      examples: ["{{record.id}}"]
  if:
    properties:
      method:
        const: updateItem
    required:
      - method
  then:
    required:
      - partitionKey
      - updateExpression
