S3:
  type: object
  description: |-
    Defines where files are written to an Amazon S3 bucket. Required when the _connectionId
    field references an AWS S3 connection; must not be included for other connection types.
    region and bucket locate the destination, fileKey sets the object key, and backupBucket
    retains a copy after a successful import.
  required:
    - region
    - bucket
  properties:
    region:
      type: string
      default: us-east-1
      x-lowercase: true
      x-celigo-ui-override: >-
        Required by the S3 import form (fieldDefinitions/resources/imports/s3.js: s3.region is
        required:true, default us-east-1). Encoded to mirror the form so builders produce
        connectable configurations.
      description: |-
        AWS region where the S3 bucket resides. Must match the bucket's actual location to avoid
        connectivity errors and misrouted requests.
      examples: ["us-east-1", "eu-west-1", "ap-southeast-2"]
    bucket:
      type: string
      x-celigo-ui-override: >-
        Required by the S3 import form (fieldDefinitions/resources/imports/s3.js: s3.bucket is
        required:true). Encoded to mirror the form so builders produce connectable configurations.
      description: |-
        S3 bucket that receives the imported files. The bucket must already exist and the
        connection's AWS credentials must have s3:PutObject permission on it.
      examples: ["my-company-imports", "customer-data-integration", "celigo-etl-files"]
    fileKey:
      type: string
      x-celigo-agent:
        - handlebars
      description: |-
        Object key under which each file is stored in the bucket. Include slashes to organize
        files in a folder-style hierarchy (for example, imports/2023/12/orders.json); keys are
        case-sensitive. Supports handlebars placeholders such as orders-{{timestamp}}.json to
        generate a unique key per run.
      examples: ["orders-{{timestamp}}.json", "imports/2023/12/data.csv", "upload.xml"]
    backupBucket:
      type: string
      description: |-
        S3 bucket where a copy of each imported file is retained after a successful import; if
        omitted, no backup copy is kept. Must reference an existing bucket the connection's
        credentials have s3:PutObject permission on.
      examples: ["my-company-archive", "integration-backup"]
    serverSideEncryptionType:
      type: string
      description: |-
        Server-side encryption applied to uploaded objects. The connection form sets `AES256`
        (SSE-S3, S3-managed keys) when encryption is enabled; leave unset to use the bucket's
        default encryption.
      examples: ["AES256"]
