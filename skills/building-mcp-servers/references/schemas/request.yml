Request:
  type: object
  description: |-
    Request body for creating or updating an MCP server. On PUT, include
    the full `tools` and `apis` arrays because omitted arrays are cleared.
    Use PATCH to update individual fields without affecting tools or apis.
  required:
    - name
    - relativeURI
  allOf:
    - $ref: "./base.yml#/MCPServerBase"
