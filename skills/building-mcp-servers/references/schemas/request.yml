Request:
  type: object
  description: |-
    Request body for creating or updating an MCP server. On PUT, include
    the full `tools` and `apis` arrays because omitted arrays are cleared.
    Use PATCH to update individual fields without affecting tools or apis.
  properties:
    name:
      type: string
      maxLength: 300
      description: Display name for the MCP server.
      examples: ["Customer Integration MCP", "Order Processing Server"]
    relativeURI:
      type: string
      maxLength: 131072
      pattern: "^\\/[a-zA-Z0-9_\\-]+$"
      description: |-
        URI path segment for the MCP server endpoint. Must be unique per
        account. Duplicates are rejected.
      examples: ["/customers", "/order-processing", "/crm_tools"]
    description:
      type: string
      maxLength: 1000
      description: Description of the MCP server's purpose.
      examples: ["Exposes customer management tools for AI agent consumption"]
    disabled:
      type: boolean
      default: true
      description: |-
        Whether the MCP server is disabled. Defaults to `true` on creation.
        To serve requests, at least one tool or API must also be enabled.
      examples: [false, true]
    tools:
      type: array
      description: |-
        Tool entries referencing Celigo Tool resources. Duplicate `_toolId`
        values are rejected. Names must be unique across both `tools` and `apis`.
      items:
        $ref: "./io-tool.yml#/IOTool"
    apis:
      type: array
      description: |-
        API entries referencing Celigo builder-mode API resources. Only
        builder-type APIs are supported. Names must be unique across both
        `tools` and `apis`.
      items:
        $ref: "./api-tool.yml#/ApiTool"
    prompts:
      type: array
      description: |-
        Prompt templates exposed to MCP clients. Each prompt has a unique
        `name` and may declare `arguments` that clients supply via
        `prompts/get`.
      items:
        $ref: "./prompt.yml#/Prompt"
    oauth:
      $ref: "./oauth-config.yml#/OAuthConfig"
  required:
    - name
    - relativeURI
