Rdbms:
  type: object
  description: |-
    Configuration for RDBMS imports into SQL Server, MySQL, PostgreSQL, Snowflake, Oracle, MariaDB, and other relational databases.
    queryType determines which companion field is required: per_record, per_page, and first_page use the query field; bulk_insert uses the bulkInsert object; bulk_load uses the bulkLoad object — never set query and bulkInsert together.
    The query field is an array of plain SQL strings, not a single string and not an array of objects.
  required:
    - queryType
  properties:
    lookups:
      # Live: array of lookup configs (matches common Lookups), not a string.
      $ref: '../../../common/schemas/lookups.yml#/Lookups'
    query:
      type: array
      items:
        type: string
      x-celigo-agent:
        - sql
      description: |-
        SQL statements to execute; required when queryType is `["per_record"]`, `["per_page"]`, or `["first_page"]`, and typically contains a single statement.
        Each element is a complete SQL statement as a plain string — never a single bare string and never an array of objects (objects cause a Cast error).
        Inject values from the incoming record with Handlebars using the `record.` prefix and triple braces, e.g. `'{{{record.name}}}'` for strings (single-quoted in the SQL) and `{{{record.quantity}}}` for numbers; references without the `record.` prefix render empty values.
        Double braces (`{{record.field}}`) output the value wrapped in single quotes while triple braces output it raw; block helpers such as `{{#each}}` and `{{#if}}` use double braces as normal.
      examples:
        - ["INSERT INTO orders (id, total) VALUES ({{{record.id}}}, {{{record.total}}})"]
        - ["{{#each batch_of_records}}UPDATE customers SET name='{{{record.name}}}' WHERE id={{{record.id}}};{{/each}}"]
    queryType:
      type: [array, 'null']
      items:
        type: string
        enum:
        - INSERT
        - UPDATE
        - bulk_insert
        - per_record
        - per_page
        - first_page
        - bulk_load
      x-enumDescriptions:
        INSERT: Legacy value for insert operations; use bulk_insert or per_record instead.
        UPDATE: Legacy value for update operations; use per_record instead.
        bulk_insert: Batch INSERT via multi-row VALUES clause for efficient bulk data loading.
        per_record: Execute one SQL statement per record, giving full control over individual record SQL.
        per_page: Execute one SQL statement per page (batch) of records.
        first_page: Execute the SQL statement once for the first page only, typically for setup or cleanup scripts.
        bulk_load: Stage data as a file and load via database-native COPY/bulk mechanism for maximum throughput.
      x-celigo-ui-override: >-
        Required by the RDBMS import form (rdbms.queryType is required:true). Form default is
        bulk_insert, overridden to bulk_load for Snowflake and BigQuery. Encoded to mirror the
        form so builders produce connectable configurations.
      description: |-
        Execution strategy for the SQL operation, which determines the required companion field: per_record, per_page, and first_page require `query`; bulk_insert requires `bulkInsert`; bulk_load requires `bulkLoad`.
        Prefer the highest-performance type the operation supports: bulk_load (currently Snowflake and NSAW — handles INSERT, upsert via `bulkLoad.primaryKeys`, and custom merge or ignore-existing logic via `bulkLoad.overrideMergeQuery`), then bulk_insert for pure INSERTs, then per_page, then per_record only when the logic cannot be expressed as a batch operation.
        For UPDATE, UPSERT, or ignore-existing logic on databases without bulk_load support, use per_page or per_record with `query` — bulk_insert has no duplicate-checking logic.
        Set a single value; do not combine types or use the legacy INSERT and UPDATE values.
        per_page statements render against the whole batch (`batch_of_records`) rather than a single record — loop with `{{#each batch_of_records}}...{{{record.fieldName}}}...{{/each}}`.
    bulkInsert:
      type: object
      description: |-
        Configuration for batch INSERTs via a multi-row VALUES clause; required when queryType is `["bulk_insert"]` and must not be set otherwise.
        Only suited to pure INSERTs — for UPDATE, UPSERT, or ignore-existing/skip-duplicates logic, use queryType `["per_record"]` with the `query` field instead.
      properties:
        tableName:
          type: string
          description: |-
            Database table that receives the inserted rows.
            Must reference an existing table; schema-qualified names (e.g. `public.orders`) are supported, and case sensitivity follows the target database.
          examples: ["public.orders", "dbo.Customers"]
        batchSize:
          type: string
          description: |-
            Number of records inserted per batch.
            Larger batches improve throughput but increase memory use and transaction duration; smaller batches reduce resource use at the cost of more transactions.
    bulkLoad:
      type: object
      properties:
        tableName:
          type: string
          description: |-
            Target table for the bulk load.
            Must reference an existing table accessible with the connection's credentials; schema-qualified names are supported.
          examples: ["public.orders", "ANALYTICS.STG_ORDERS"]
        primaryKeys:
          type: array
          items:
            type: string
          description: |-
            Columns that uniquely identify each record in the target table, used to match existing rows during the load.
            Set for upsert behavior (a MERGE is auto-generated); omit (or empty) for a pure INSERT.
            Composite keys are supported — list every key column, and names must exactly match the target schema.
          examples:
            - ["id"]
            - ["INTERNAL_ID", "LOCATION_INTERNAL_ID"]
        overrideMergeQuery:
          type: boolean
          description: |-
            When true, a custom merge query replaces the auto-generated MERGE statement, enabling ignore-existing logic, conditional updates, or multi-table operations.
            The override SQL references `{{import.rdbms.bulkLoad.preMergeTemporaryTable}}` for the staging table.
      description: |-
        Configuration for bulk loading: data is staged as a file and loaded via the database's native COPY/bulk mechanism for maximum throughput.
        Required when queryType is `["bulk_load"]`; currently supported for Snowflake and NSAW.
    updateLookupName:
      type: [string, 'null']
      description: Name of the lookup used for update operations in the legacy composite (queryType1) flow.
    updateExtract:
      type: [string, 'null']
      description: Path used to extract the value that drives update operations in the legacy composite flow.
    ignoreLookupName:
      type: [string, 'null']
      description: Name of the lookup used to determine which records to ignore when ignore-existing is enabled.
    ignoreExtract:
      type: [string, 'null']
      description: Path used to extract the value that determines whether a record is ignored when ignore-existing is enabled.
