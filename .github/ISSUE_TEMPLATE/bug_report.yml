name: Bug report
description: Report an issue with a Celigo skill
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this issue!
  - type: textarea
    id: what-happened
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: input
    id: skill
    attributes:
      label: Skill name
      placeholder: configuring-exports
    validations:
      required: true
  - type: input
    id: agent
    attributes:
      label: AI agent
      placeholder: Claude Code, Cursor, Codex, etc.
    validations:
      required: true
  - type: textarea
    id: repro-steps
    attributes:
      label: To reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Install skill with '...'
        2. Ask the agent to '...'
        3. See incorrect output
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
    validations:
      required: false
